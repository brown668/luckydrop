function initGame() {
  // ── 建立 AbortController（行数切换时中止旧实例的监听器和呼吸循环）──
  const ctrl = new AbortController();
  _gameCtrl  = ctrl;
  const { signal } = ctrl;

  // ── 常量（与 drawBoard 保持一致）──
  const ROWS       = selectedRows;
  const SLOTS      = selectedRows + 1;  // 第一行2钉 → ROWS+1槽
  const mwH        = (document.querySelector('.machine-wrap')?.offsetHeight) || 0;
  const padT       = 10 + mwH;
  const padB       = 7;
  // 使用实际容器宽度，与 drawBoard 保持一致（.device 有 6px 边框，内容宽 ≠ 390）
  const W          = document.getElementById('board').parentElement.offsetWidth || 390;
  const cx         = W / 2;
  const d          = (W - 2 * PAD_SIDE) / (ROWS + 1); // 底行外沿贴安全边缘，行少钉大
  const rowH       = d * Math.sqrt(3) / 2;
  const H          = padT + ROW_H16 * ROWS_MAX + padB; // 固定高度
  const pegR       = Math.min(rowH, d) * 0.17;
  const ballR      = Math.max(4, Math.min(9, pegR * 1.75));
  const splits = getSplits();

  // 底行钉子中心固定在 canvas 底部上方 15px（与 drawBoard 一致）
  const pegShift   = (H - padB - 15) - (padT + (ROWS - 0.5) * rowH);
  const pegX = (row, col) => cx - ((row + 2) * d) / 2 + col * d;
  const pegY = (row)      => padT + row * rowH + rowH / 2 + pegShift;

  // ── 状态（balance/autoMode/balls 等为模块级，跨 initGame 调用持久）──
  let rafId = null;

  // ── DOM 引用 ──
  const canvas   = document.getElementById('board');
  const ctx      = canvas.getContext('2d');
  const balEl    = document.querySelector('.bal-value');
  const startBtn = document.querySelector('.start-btn');
  const startLbl = startBtn.querySelector('span');           // 内部文本容器（被 CSS 隐藏，仅作状态承载）
  const autoPanel = document.querySelector('.ctrl-auto');    // AUTO 面板承担自动按钮角色
  const histList = document.querySelector('.hist-list');

  // 行数切换后重置按钮状态（上一局球若未落槽已被清除，按钮应可用）
  if (!autoMode) startBtn.disabled = false;

  // 余额格式化
  function fmtBalance(v) {
    return '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  balEl.textContent = fmtBalance(balance);

  // ── 历史倍率 class ──
  function histClass(m) {
    if (m >= 100)  return 'h-mega';     // 金
    if (m >= 25)   return 'h-jackpot';  // 红粉
    if (m >= 3)    return 'h-high';     // 橙红
    if (m >= 1.5)  return 'h-orange';   // 橙黄
    if (m >= 1.2)  return 'h-great';    // 绿
    if (m >= 1.05) return 'h-good';     // 青绿
    if (m >= 0.8)  return 'h-mid';      // 青蓝
    return 'h-low';                     // 深灰蓝
  }

  function addHistory(multiplier) {
    const badge = document.createElement('div');
    badge.className = 'hist-badge ' + histClass(multiplier);
    const mDisp = multiplier >= 1000
      ? (Math.round(multiplier / 100) / 10 + 'K')
      : multiplier >= 10 ? Math.round(multiplier) : multiplier;
    badge.textContent = mDisp + '×';
    histList.appendChild(badge);
    histList.scrollLeft = histList.scrollWidth;
    while (histList.children.length > 30) histList.removeChild(histList.firstChild);
  }

  // 足球配色：底色(白) + 五边形色 + 阴影 + 最深（用于分裂态标识）
  const BALL_PALETTES = [
    ['#ffffff','#1a1a1a','#d8dce0'],   // depth 0：经典黑白足球
    ['#fff1e0','#8a2a08','#d8bfa8'],   // depth 1：暖橙足球
    ['#ffdfe5','#880020','#d8a8b0'],   // depth 2：深红足球
  ];

  // ── 绘制单球（足球样式：白底 + 5 个黑色五边形；可按 color 叠色）──
  function drawBall(x, y, alpha = 1, depth = 0, rot = 0, color = 'normal') {
    ctx.shadowBlur = 0;
    ctx.globalAlpha = alpha;
    drawSoccerBall(ctx, x, y, ballR, rot);
    // 高倍率球：红/金色叠加（multiply 保留球面明暗纹理）
    if (color === 'red' || color === 'gold') {
      ctx.save();
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = color === 'red' ? 'rgba(230,60,60,0.85)' : 'rgba(255,200,40,0.9)';
      ctx.beginPath(); ctx.arc(x, y, ballR, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      // 发光描边
      ctx.save();
      ctx.strokeStyle = color === 'red' ? 'rgba(255,120,120,0.8)' : 'rgba(255,235,120,0.9)';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = color === 'red' ? 'rgba(255,80,80,0.9)' : 'rgba(255,200,40,0.95)';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(x, y, ballR + 0.5, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  /**
   * 按截角二十面体正投影绘制 ⚽ 足球
   * 几何布局（共享边构型）：
   *   - 中心黑色正五边形（边长 s1）
   *   - 5 个白色正六边形围绕中心五边形，每个六边形的一条内边与中心五边形的一条边重合
   *   - 相邻两六边形在五边形顶点处"顶点邻接"，它们的外顶点之间留出三角形黑色缝隙
   *   - 这些黑色缝隙 + 外圆边缘共同构成 5 瓣"背面黑五边形"的可见投影
   * 底色采用黑色，不再画白色内圆 → 黑色瓣直接透出
   */
  function drawSoccerBall(cx2d, x, y, R, rot = 0) {
    // 阴影（阴影位置不跟随旋转）
    cx2d.save();
    cx2d.fillStyle = 'rgba(0,0,0,0.38)';
    cx2d.beginPath(); cx2d.arc(x + 0.8, y + 1.4, R * 0.96, 0, Math.PI * 2); cx2d.fill();
    cx2d.restore();

    // 优先使用 ball1.jpg 生成的 sprite 贴图（带旋转）
    if (BALL_SPRITE.ready && BALL_SPRITE.img) {
      cx2d.save();
      cx2d.translate(x, y);
      if (rot) cx2d.rotate(rot);
      cx2d.drawImage(BALL_SPRITE.img, -R, -R, R * 2, R * 2);
      cx2d.restore();
      return;
    }

    // 回退几何绘制
    // 1. 黑色底圆（作为中心五边形 + 5 瓣 + 外圈细边的共同底色）
    cx2d.fillStyle = '#141414';
    cx2d.beginPath(); cx2d.arc(x, y, R, 0, Math.PI * 2); cx2d.fill();

    // 几何参数（截角二十面体正投影）
    const r1       = R * 0.26;                           // 中心五边形外接圆半径
    const a1       = r1 * Math.cos(Math.PI / 5);         // 中心五边形 apothem
    const s1       = 2 * r1 * Math.sin(Math.PI / 5);     // 五边形边长 = 六边形边长
    const r2       = s1;                                 // 六边形外接圆半径
    const a2       = r2 * Math.cos(Math.PI / 6);         // 六边形 apothem
    const hex_dist = a1 + a2;                            // 六边形中心到原点的距离

    // 2. 5 个白色六边形（一条边与中心五边形共享）
    //    六边形方向：朝内边的法线 = 径向外，所以顶点相对朝内方向偏移 ±30°, ±90°, ±150°
    const whiteGrad = cx2d.createRadialGradient(x - R * 0.3, y - R * 0.35, 0, x, y, R);
    whiteGrad.addColorStop(0,    '#ffffff');
    whiteGrad.addColorStop(0.7,  '#f3f4f6');
    whiteGrad.addColorStop(1,    '#c8ced4');
    cx2d.fillStyle = whiteGrad;
    for (let i = 0; i < 5; i++) {
      const ang = (i * Math.PI * 2) / 5 - Math.PI / 2;  // 从正上方 72° 均分
      const hx = x + Math.cos(ang) * hex_dist;
      const hy = y + Math.sin(ang) * hex_dist;
      cx2d.beginPath();
      for (let j = 0; j < 6; j++) {
        // 顶点角度：朝内方向 ang+π，起点偏移 π/6（让一条边法线对齐径向）
        const vang = ang + Math.PI + Math.PI / 6 + (j * Math.PI / 3);
        const vx = hx + Math.cos(vang) * r2;
        const vy = hy + Math.sin(vang) * r2;
        j === 0 ? cx2d.moveTo(vx, vy) : cx2d.lineTo(vx, vy);
      }
      cx2d.closePath();
      cx2d.fill();
    }
    // 中心五边形区域本身底色就是黑色，无需再画（被 6 个白六边形自然围出）

    // 3. 顶部径向高光（球面质感）
    const sh = cx2d.createRadialGradient(x - R * 0.4, y - R * 0.45, 0, x - R * 0.4, y - R * 0.45, R * 0.95);
    sh.addColorStop(0,    'rgba(255,255,255,0.45)');
    sh.addColorStop(0.55, 'rgba(255,255,255,0.06)');
    sh.addColorStop(1,    'rgba(255,255,255,0)');
    cx2d.fillStyle = sh;
    cx2d.beginPath(); cx2d.arc(x, y, R - 0.5, 0, Math.PI * 2); cx2d.fill();
  }

  // ── 绘制球 + 尾部幻影 ──
  function drawBallWithTrail(ball) {
    ctx.globalAlpha = 1;
    drawBall(ball.x, ball.y, 1, ball.depth || 0, ball.rot || 0, ball.color || 'normal');
  }

  // ── 线段 (x1,y1)→(x2,y2) 是否与圆心 (cxC,cyC) 半径 r 的圆相交 ──
  // 用于 swept collision：捕获高速球"擦过"分裂钉检测圆的情况
  function segHitsCircle(x1, y1, x2, y2, cxC, cyC, r) {
    const fx = x1 - cxC, fy = y1 - cyC;
    if (fx * fx + fy * fy <= r * r) return true;  // 起点已在圆内
    const dx = x2 - x1, dy = y2 - y1;
    const a = dx * dx + dy * dy;
    if (a === 0) return false;
    const b = 2 * (fx * dx + fy * dy);
    const c = fx * fx + fy * fy - r * r;
    const disc = b * b - 4 * a * c;
    if (disc < 0) return false;
    const sq = Math.sqrt(disc);
    const t1 = (-b - sq) / (2 * a);
    const t2 = (-b + sq) / (2 * a);
    // 任一交点在 [0,1] 内即线段穿越圆
    return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1);
  }

  // ── 物理更新 ──
  function updateBall(ball, dt = 1) {
    // 重力（按 dt 缩放）
    ball.vy += 0.032;
    if (ball.vy > 1.8) ball.vy = 1.8;

    ball.vx *= 0.98;

    // 记录移动前位置，用于 swept 检测分裂钉
    const prevX = ball.x;
    const prevY = ball.y;

    ball.x += ball.vx;
    ball.y += ball.vy;

    // ── 旋转积分（空气极轻阻尼）──
    if (ball.rot  == null) ball.rot  = 0;
    if (ball.vrot == null) ball.vrot = 0;
    ball.rot  += ball.vrot * dt;
    ball.vrot *= 0.995;

    // 边界反弹（反弹时注入自旋：ball 被墙弹回，摩擦产生相反方向旋转）
    if (ball.x < ballR) {
      ball.x = ballR;
      ball.vx = Math.abs(ball.vx) * 0.5;
      ball.vrot += ball.vy / ballR * 0.4;
    }
    if (ball.x > W - ballR) {
      ball.x = W - ballR;
      ball.vx = -Math.abs(ball.vx) * 0.5;
      ball.vrot -= ball.vy / ballR * 0.4;
    }

    if (!ball.cooldown) ball.cooldown = {};
    let hitResult = null;
    const minDist = ballR + pegR;

    // ── 分裂钉 swept 检测：捕获球在一帧内"穿过"或"擦过"分裂钉检测圆的所有情况 ──
    // 视觉 glowR_max ≈ pegR*2.4 + 10；取 splitR = ballR + pegR*4 ≈ 21.6px（略大于视觉）
    const splitR = ballR + pegR * 4;
    for (const [sr, sc] of splits) {
      const spk = sr * 20 + sc;
      if (ball.usedSplits?.[spk]) continue;
      const spx = pegX(sr, sc), spy = pegY(sr);
      // swept: 检测 (prevX,prevY) → (ball.x,ball.y) 线段是否与 splitR 圆相交
      if (segHitsCircle(prevX, prevY, ball.x, ball.y, spx, spy, splitR)) {
        if (!ball.usedSplits) ball.usedSplits = {};
        ball.usedSplits[spk] = true;
        hitResult = { pegKey: spk, isSplit: true };
        pegGlows[spk] = 1;
        break;
      }
    }

    for (let row = 0; row < ROWS; row++) {
      const numPegs = row + 3;   // 第一行固定 3 钉，底行 = 槽数+1
      for (let col = 0; col < numPegs; col++) {
        const pegKey = row * 20 + col;
        const px = pegX(row, col);
        const py = pegY(row);
        const dx = ball.x - px;
        const dy = ball.y - py;
        const distSq = dx * dx + dy * dy;

        if (distSq >= minDist * minDist) continue; // 不在碰撞范围，跳过

        const dist = Math.sqrt(distSq);
        const nx = dx / dist;
        const ny = dy / dist;

        // ── 始终推出，确保无视觉重叠 ──
        ball.x = px + nx * (minDist + 2);
        ball.y = py + ny * (minDist + 2);

        if (ball.cooldown[pegKey] > 0) {
          // 冷却中：仅推出，不改速度
          ball.cooldown[pegKey]--;
          continue;
        }

        // ── 碰撞响应：侧向偏转模型 ──
        const side = dx >= 0 ? 1 : -1;
        ball.vx = side * (0.45 + Math.random() * 0.55);
        ball.vy = Math.max(Math.abs(ball.vy) * 0.65, 0.35) - 0.08;
        ball.cooldown[pegKey] = 18;

        // ── 碰撞驱动旋转：接触点切向速度 → 角速度（摩擦滚动模型）──
        // 切向量 (tx, ty) = 法向量 (nx, ny) 顺时针旋 90°
        const tx = -ny;
        const ty = nx;
        const vT = ball.vx * tx + ball.vy * ty;  // 切向线速度
        // ω = v_tangent / R，0.85 为摩擦系数，带轻微随机抖动模拟滑移
        ball.vrot = vT / ballR * 0.85 + (Math.random() - 0.5) * 0.08;

        pegGlows[pegKey] = 1;
        if (!hitResult) {
          hitResult = { pegKey, isSplit: false };
        }
      }
    }
    return hitResult;
  }

  // ── 检测落槽 ──
  function checkLanded(ball) {
    const landY = H - ballR;
    if (ball.y >= landY) {
      // 槽居中，左边界由当前行数的 d 决定
      const slotLeft = cx - SLOTS * d / 2;
      let idx = Math.floor((ball.x - slotLeft) / d);
      idx = Math.max(0, Math.min(SLOTS - 1, idx));
      return idx;
    }
    return -1;
  }

  // ── 结算 ──
  function settle(slotIdx, weight = 1) {
    const cfg  = slotConfigs[modeIdx];
    const val  = cfg[slotIdx];
    const multiplier = val;

    const slotEl = slotEls[slotIdx];

    const bet    = betValues[betIdx];
    const won    = parseFloat((bet * weight * multiplier).toFixed(2));
    pendingWin   = parseFloat((pendingWin + won).toFixed(2));

    // 得分音效
    if (window._onWin) window._onWin(multiplier);

    // 槽位高亮
    slotEl.classList.add('winning');
    setTimeout(() => slotEl.classList.remove('winning'), 500);

    // 飘字：+$XX 显示在对应槽位上方
    (function showFloatWin() {
      const boardEl = document.querySelector('.board-wrap');
      const boardRect = boardEl.getBoundingClientRect();
      const canvasEl  = document.getElementById('board');
      const canvasRect = canvasEl.getBoundingClientRect();

      const el = document.createElement('div');
      el.className = 'float-win' + (multiplier >= 100 ? ' mega' : multiplier >= 25 ? ' jackpot' : '');
      el.textContent = '+$' + won.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

      // 槽居中，CSS 像素下按当前行数 d 缩放（canvasRect.width == W，scale 恒为 1）
      const d_css       = d;           // d 已用实际 W 计算，无需再乘 scale
      const cssSlotW    = d_css;       // 单槽宽，用于边缘槽位溢出保护
      const slotLeftCss = canvasRect.width / 2 - SLOTS * d_css / 2;
      const slotCenterX = slotLeftCss + (slotIdx + 0.5) * d_css;
      const rawX = canvasRect.left - boardRect.left + slotCenterX;
      const relY = canvasRect.top  - boardRect.top  + canvasRect.height - 20;

      // wrapper 负责水平定位，el 负责向上飘动动画
      // 两者分离，避免动画 transform 覆盖水平对齐的 translateX
      const wrapper = document.createElement('div');
      wrapper.style.cssText = `position:absolute;top:${relY}px;pointer-events:none;z-index:20;`;

      if (slotIdx <= 2) {
        wrapper.style.left = Math.max(rawX - cssSlotW * 0.5, 2) + 'px';
      } else if (slotIdx >= SLOTS - 3) {
        const rightOffset = Math.max(boardRect.width - (rawX + cssSlotW * 0.5), 2);
        wrapper.style.right = rightOffset + 'px';
      } else {
        wrapper.style.left = rawX + 'px';
        wrapper.style.transform = 'translateX(-50%)';
      }

      el.style.position = 'static';
      el.style.zIndex   = '';
      wrapper.appendChild(el);
      boardEl.appendChild(wrapper);
      setTimeout(() => wrapper.remove(), 1500);
    })();

    // Respin：命中 respin 槽则触发免费补发一球 + 红球旋转吸附特效
    if (window.buyFeatures && window.buyFeatures.respin && respinSlots.has(slotIdx)) {
      const slotEl = slotEls[slotIdx];
      const barEl = slotEl && slotEl.querySelector('.slot-bar');
      if (slotEl && barEl) {
        // 1) 红球自转 + 发光脉冲
        slotEl.classList.remove('jersey-hit');
        void slotEl.offsetWidth; // reflow 重启动画
        slotEl.classList.add('jersey-hit');
        setTimeout(() => slotEl.classList.remove('jersey-hit'), 1050);

        // 2) 被吸的小白球：从 slot-bar 中心升起、缩入红球中心
        const suck = document.createElement('div');
        suck.className = 'respin-suck-ball';
        barEl.appendChild(suck);
        setTimeout(() => suck.remove(), 700);

        // 3) 6 颗向心粒子：从外围以不同角度飞入红球中心
        for (let k = 0; k < 6; k++) {
          const angle = (k / 6) * Math.PI * 2 + Math.random() * 0.5;
          const dist = 22 + Math.random() * 10;
          const sp = document.createElement('div');
          sp.className = 'respin-suck-spark';
          sp.style.setProperty('--sx', `${Math.cos(angle) * dist}px`);
          sp.style.setProperty('--sy', `${Math.sin(angle) * dist - 6}px`);
          sp.style.animationDelay = `${k * 45}ms`;
          barEl.appendChild(sp);
          setTimeout(() => sp.remove(), 850 + k * 45);
        }

        // 4) "+1 免费球" 飘字 —— 吸附完成后再出现
        setTimeout(() => {
          const tx = document.createElement('div');
          tx.className = 'jersey-respin-text';
          tx.style.left = '50%';
          tx.style.top = '-8px';
          tx.textContent = '+1 免费球';
          slotEl.appendChild(tx);
          setTimeout(() => tx.remove(), 1600);
        }, 480);
      }

      // 稍作延时后真正补发一球（等旋转吸附的视觉先走完）
      setTimeout(() => { launchBall({ free: true }); }, 1050);
    }

    function done() {
      pendingSettles--;
      if (balls.length === 0 && pendingSettles === 0) afterSettle();
    }

    addHistory(multiplier);
    done();
  }

  // ── 结算后处理（所有球都落槽后） ──
  function afterSettle() {
    // 一次性把本轮盈利加入余额
    if (pendingWin > 0) {
      const totalWon = pendingWin;
      pendingWin = 0;
      // 等槽位飘字动画结束（1.4s）后留约0.6s间隔再显示余额飘字
      setTimeout(() => {
        balance = parseFloat((balance + totalWon).toFixed(2));
        balEl.textContent = fmtBalance(balance);
        const wrap = document.querySelector('.balance-wrap');
        const el = document.createElement('div');
        el.className = 'bal-float';
        el.textContent = '+$' + totalWon.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 2200);
      }, 500);
    } else {
      pendingWin = 0;
    }

    drawBoard();

    if (autoMode && autoRemaining > 0) {
      // 自动模式下保持控件锁定；按钮保持可点（用于点击停止）
      startBtn.disabled = false;
      setTimeout(() => {
        if (autoMode && autoRemaining > 0) {
          const ok = launchBall();
          if (ok) autoRemaining--;
          else {
            // 余额不足：退出自动
            autoMode = false;
            autoRemaining = 0;
            autoPanel.classList.remove('active');
            startBtn.classList.remove('stopping');
            if (startLbl) startLbl.textContent = '开始';
            restoreAutoDisplay();
            lockControls(false);
          }
        } else if (autoMode) {
          autoMode = false;
          autoPanel.classList.remove('active');
          startBtn.classList.remove('stopping');
          if (startLbl) startLbl.textContent = '开始';
          restoreAutoDisplay();
          lockControls(false);
        }
      }, 600);
    } else if (autoMode) {
      // 余数归零，退出自动
      autoMode = false;
      autoPanel.classList.remove('active');
      startBtn.classList.remove('stopping');
      if (startLbl) startLbl.textContent = '开始';
      startBtn.disabled = false;
      restoreAutoDisplay();
      lockControls(false);
    } else {
      // 单发完成，解锁
      startBtn.disabled = false;
      lockControls(false);
    }
  }

  // ── 动画循环（多球）──
  let lastFrameTime = 0;
  function gameLoop(timestamp) {
    if (balls.length === 0 && pendingSettles === 0) return;
    const delta = lastFrameTime ? Math.min(timestamp - lastFrameTime, 50) : 16.67;
    lastFrameTime = timestamp;
    const dt = delta / 16.67;  // 连续缩放，避免整数步跳帧

    // 衰减钉子发光
    Object.keys(pegGlows).forEach(k => {
      pegGlows[k] -= 0.08;
      if (pegGlows[k] <= 0) delete pegGlows[k];
    });

    // 重绘静态层（含钉子发光）
    drawBoard(pegGlows);

    // 更新 + 绘制每颗球（物理步数按帧率校正，保持 60fps 等效速度）
    for (let i = balls.length - 1; i >= 0; i--) {
      const ball = balls[i];

      // 记录尾迹
      if (!ball.trail) ball.trail = [];
      ball.trail.push({ x: ball.x, y: ball.y });
      if (ball.trail.length > 7) ball.trail.shift();

      // 物理更新（连续 delta-time，每帧1次，无跳帧）
      let hit = null;
      const h = updateBall(ball, dt);
      if (h) hit = h;
      if (hit) {
        pegGlows[hit.pegKey] = 1.0;
        const canSplitNow = hit.isSplit &&
          (ball.splitFrom == null || ball.splitFrom !== hit.pegKey) &&
          balls.length < 8;
        if (canSplitNow) {
          ball.splitFrom = hit.pegKey;
          const splitW = (ball.weight ?? 1) * 0.55;
          ball.weight = splitW;
          ball.depth  = (ball.depth || 0) + 1;
          balls.push({
            x:  ball.x,
            y:  ball.y,
            vx: -(ball.vx) + (Math.random() - 0.5) * 0.4,
            vy:  ball.vy  * 0.85,
            trail:    [],
            cooldown: {},
            isSplit:  true,
            splitFrom: hit.pegKey,
            weight:   splitW,
            depth:    ball.depth,
            rot:      ball.rot || 0,
            vrot:     -(ball.vrot || 0) * 0.7 + (Math.random() - 0.5) * 0.2,
            // 继承父球已用的分裂钉记忆：避免子球反弹回同一分裂钉时重复触发
            usedSplits: { ...(ball.usedSplits || {}) },
            color:     ball.color || 'normal',
            extraMult: ball.extraMult || 1,
            // 分裂子球不算主体球，不占自动投注额度
            primary:   false,
          });
          // 分裂特效：粒子 + 飘字 + 音效
          if (window._onSplit) window._onSplit(ball.x, ball.y);
        } else if (hit && !hit.isSplit) {
          // 普通碰钉音效
          if (window._onHit) window._onHit();
        }
      }

      // 绘制（含尾迹）
      drawBallWithTrail(ball);

      // 落槽检测
      const idx = checkLanded(ball);
      if (idx >= 0) {
        const w = (ball.weight ?? 1) * (ball.extraMult ?? 1);
        const wasPrimary = ball.primary === true;
        balls.splice(i, 1);
        pendingSettles++;
        settle(idx, w);
        // 自动投注倒计时：每有一颗主体球落地，显示数字 -1（∞ 除外）
        if (autoMode && wasPrimary && autoTotalAtStart !== Infinity) {
          autoLanded++;
          const remain = Math.max(0, autoTotalAtStart - autoLanded);
          if (autoEl) autoEl.textContent = String(remain);
        }
      }
    }

    if (balls.length > 0 || pendingSettles > 0) {
      rafId = requestAnimationFrame(gameLoop);
    }
  }

  // ── 一次发球（单球）──
  function launchBall(opts = {}) {
    const free = opts.free === true;   // Respin 返还球免费
    const bet       = betValues[betIdx];
    const multiplier = (typeof buyCostMultiplier === 'function') ? buyCostMultiplier() : 1;
    const totalCost = free ? 0 : parseFloat((bet * multiplier).toFixed(2));
    if (!free && balance < totalCost) {
      if (startLbl) {
        startLbl.textContent = '余额不足';
        setTimeout(() => {
          if (startLbl) startLbl.textContent = autoMode ? '停止' : '开始';
        }, 1200);
      }
      return false;
    }

    balance = parseFloat((balance - totalCost).toFixed(2));
    balEl.textContent = fmtBalance(balance);
    // 自动模式下按钮保持可点（用于"停止"）；单发模式才置灰
    startBtn.disabled = !autoMode;
    lockControls(true);

    // 高倍率球抽样：开启后按概率产出红/金球
    let ballColor = 'normal';
    let extraMult = 1;
    if (window.buyFeatures && window.buyFeatures.hiMult && !free) {
      const r = Math.random();
      if (r < 0.08)       { ballColor = 'gold'; extraMult = 4; }
      else if (r < 0.25)  { ballColor = 'red';  extraMult = 2; }
    }

    balls.push({
      x:  cx + (Math.random() - 0.5) * 10,
      y:  padT - 16,
      vx: (Math.random() - 0.5) * 0.3,
      vy: 1.6,
      trail:    [],
      cooldown: {},
      isSplit:   false,
      splitFrom: null,
      weight:    1.0,
      rot:       (Math.random() - 0.5) * Math.PI, // 出场随机姿态
      vrot:      (Math.random() - 0.5) * 0.05,
      color:     ballColor,
      extraMult: extraMult,
      // 主体球：付费发出的常规球；免费球（respin 返还）不占自动投注额度
      primary:   !free,
    });

    if (!rafId || balls.length === 1) {
      rafId = requestAnimationFrame(gameLoop);
    }
    return true;
  }

  // ── 开始 / 停止 足球按钮 ──
  // 单发：点击发一颗球，按钮短暂置灰至落槽恢复
  // 自动：自动投注 > 0 时进入自动模式，按钮变"停止"；点击"停止"可中断
  startBtn.addEventListener('click', () => {
    if (autoMode) {
      // 停止自动：立即结束（仍在飞的球会自然落下；afterSettle 会补全清理）
      autoMode = false;
      autoRemaining = 0;
      autoPanel.classList.remove('active');
      startBtn.classList.remove('stopping');
      if (startLbl) startLbl.textContent = '开始';
      // 自动投注显示恢复到原始选择值
      restoreAutoDisplay();
      // 若已无飞行球，立即解锁；否则由 afterSettle 解锁
      if (balls.length === 0 && pendingSettles === 0) lockControls(false);
      return;
    }
    const autoTotal = autoValues[autoIdx];
    if (autoTotal > 0) {
      autoMode         = true;
      autoRemaining    = autoTotal;
      autoTotalAtStart = autoTotal;
      autoLanded       = 0;
      autoPanel.classList.add('active');
      startBtn.classList.add('stopping');
      if (startLbl) startLbl.textContent = '停止';
    }
    const ok = launchBall();
    if (!ok && autoMode) {
      autoMode = false;
      autoRemaining = 0;
      autoPanel.classList.remove('active');
      startBtn.classList.remove('stopping');
      if (startLbl) startLbl.textContent = '开始';
      restoreAutoDisplay();
    } else if (autoMode) {
      autoRemaining--;
    }
  }, { signal });

  // ── 常驻呼吸动画（行数切换时 abort 自动停止）──
  (function breathingLoop() {
    if (signal.aborted) return;
    if (balls.length === 0 && pendingSettles === 0) {
      drawBoard(pegGlows);
    }
    requestAnimationFrame(breathingLoop);
  })();
}
</script>

<script>
// ══════════════════════════════════════════════
//  音频引擎
//  BGM  → HTML5 Audio 播放原曲文件 bgm.mp3
//  SFX  → Web Audio API 程序合成
// ══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let bgGain = null;
let musicOn = true;

// HTML5 Audio BGM
let bgAudio = null;

// ── BGM：HTML5 Audio 播放原曲文件 ──
// 将音频文件命名为 bgm.mp3（或 bgm.ogg）放在与 HTML 同目录即可
function startBGM() {
  if (bgAudio) return;
  bgAudio = new Audio('./bgm.mp3');
  bgAudio.loop = true;
  bgAudio.volume = 0.5;
  if (musicOn) bgAudio.play().catch(() => {});
}

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    bgGain = audioCtx.createGain();  // 仅用于 SFX
    bgGain.gain.value = 1.0;
    bgGain.connect(audioCtx.destination);
    startBGM();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── 音效：分裂 ──
function playSplitSfx() {
  if (!sfxOn) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  // 柔和上升音调：三声轻铃，正弦波，低音量，慢衰减
  [0, 0.08, 0.16].forEach((dt, i) => {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    const g   = ctx.createGain();
    g.gain.value = 0.10;
    osc.connect(env); env.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520 + i * 130, now + dt);
    osc.frequency.linearRampToValueAtTime(640 + i * 130, now + dt + 0.22);
    env.gain.setValueAtTime(0, now + dt);
    env.gain.linearRampToValueAtTime(0.7, now + dt + 0.02);
    env.gain.exponentialRampToValueAtTime(0.001, now + dt + 0.38);
    osc.start(now + dt);
    osc.stop(now + dt + 0.4);
  });

  // 轻微气泡噪声（音量极低，增加质感）
  const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++)
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
  const src  = ctx.createBufferSource();
  const nG   = ctx.createGain();
  nG.gain.value = 0.06;
  src.buffer = buf; src.connect(nG); nG.connect(ctx.destination);
  src.start(now); src.stop(now + 0.08);
}

// ── 音效：碰钉 ──
function playHitSfx() {
  if (!sfxOn) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  const g = ctx.createGain(); g.gain.value = 0.12;
  osc.connect(env); env.connect(g); g.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.value = 480 + Math.random() * 120;
  env.gain.setValueAtTime(0.6, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.start(now); osc.stop(now + 0.09);
}

// ── 音效：落槽得分 ──
function playWinSfx(multiplier) {
  if (!sfxOn) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const freqs = multiplier >= 10 ? [523, 659, 784, 1047] : [392, 494, 587];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    const g = ctx.createGain(); g.gain.value = 0.22;
    osc.connect(env); env.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = f;
    const t = now + i * 0.07;
    env.gain.setValueAtTime(0.7, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t); osc.stop(t + 0.26);
  });
}

// ── 设置抽屉（header 右上角齿轮图标触发）──
let sfxOn = true;
const iconMenu        = document.getElementById('iconMenu');
const settingsPanel   = document.getElementById('settingsPanel');
const drawerBackdrop  = document.getElementById('drawerBackdrop');
const toggleMusic     = document.getElementById('toggleMusic');
const toggleSfx       = document.getElementById('toggleSfx');
const drawerRules     = document.getElementById('drawerRules');
const drawerExit      = document.getElementById('drawerExit');
const toastEl         = document.getElementById('toast');

// ── Toast 组件 ──
let _toastTimer = null;
function showToast(msg, duration = 1800) {
  if (!toastEl) return;
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

// 打开抽屉
function openDrawer() {
  getAudioCtx();
  settingsPanel.classList.add('open');
  drawerBackdrop.classList.add('show');
}
// 关闭抽屉
function closeDrawer() {
  settingsPanel.classList.remove('open');
  drawerBackdrop.classList.remove('show');
}

// 齿轮图标：打开抽屉
iconMenu.addEventListener('click', e => {
  e.stopPropagation();
  openDrawer();
});

// 点击遮罩：关闭抽屉
drawerBackdrop.addEventListener('click', closeDrawer);

// 游戏规则：toast 敬请期待
drawerRules.addEventListener('click', () => {
  showToast('敬请期待');
});

// 退出游戏：关闭抽屉 + 提示
drawerExit.addEventListener('click', () => {
  closeDrawer();
  showToast('已退出游戏');
});

// ═══════════════════════════════════════════════════════════
//  购买高倍率弹窗：状态 + 交互 + 费用显示
// ═══════════════════════════════════════════════════════════
window.buyFeatures = { split: false, respin: false, hiMult: false };
const BUY_RATES = { split: 0.6, respin: 0.2, hiMult: 0.2 };

const buyModal      = document.getElementById('buyModal');
const buyModalClose = document.getElementById('buyModalClose');
const buyBtnPanel   = document.getElementById('btnBuyFeatures');
const tglSplit      = document.getElementById('toggleSplit');
const tglRespin     = document.getElementById('toggleRespin');
const tglHiMult     = document.getElementById('toggleHiMult');
const costSplitEl   = document.getElementById('costSplit');
const costRespinEl  = document.getElementById('costRespin');
const costHiMultEl  = document.getElementById('costHiMult');

function currentBet() { return betValues[betIdx]; }

// 按当前投注额刷新弹窗里展示的附加费用
function refreshBuyCosts() {
  const bet = currentBet();
  const fmt = (rate) => '+' + (bet * rate).toFixed(1);
  if (costSplitEl)  costSplitEl.textContent  = fmt(BUY_RATES.split);
  if (costRespinEl) costRespinEl.textContent = fmt(BUY_RATES.respin);
  if (costHiMultEl) costHiMultEl.textContent = fmt(BUY_RATES.hiMult);
}
refreshBuyCosts();

// 总投注乘数（基础 1 + 勾选的附加项）
function buyCostMultiplier() {
  const f = window.buyFeatures;
  return 1 + (f.split ? BUY_RATES.split : 0)
           + (f.respin ? BUY_RATES.respin : 0)
           + (f.hiMult ? BUY_RATES.hiMult : 0);
}

function refreshBuyBtnBadge() {
  const f = window.buyFeatures;
  const any = f.split || f.respin || f.hiMult;
  buyBtnPanel?.classList.toggle('active', any);
  // 按 key 同步每个小图标的亮/暗
  document.querySelectorAll('#btnBuyFeatures .bf-icon').forEach(el => {
    const k = el.dataset.key;
    el.classList.toggle('on', !!f[k]);
  });
  // 总投注 = 常规投注 × (1 + 附加功能乘数)
  const totalEl = document.getElementById('fbTotalBet');
  if (totalEl) {
    const bet = currentBet();
    const total = bet * buyCostMultiplier();
    totalEl.textContent = total.toFixed(1);
  }
}
refreshBuyBtnBadge();

function openBuyModal() {
  if (autoMode || balls.length > 0 || pendingSettles > 0) {
    showToast('投注进行中，暂不可修改');
    return;
  }
  refreshBuyCosts();
  buyModal.classList.add('open');
  drawerBackdrop.classList.add('show');
}
function closeBuyModal() {
  buyModal.classList.remove('open');
  // 只在设置抽屉未打开时才关闭遮罩
  if (!settingsPanel.classList.contains('open')) {
    drawerBackdrop.classList.remove('show');
  }
}

buyBtnPanel?.addEventListener('click', openBuyModal);
buyModalClose?.addEventListener('click', closeBuyModal);
// 复用设置抽屉的遮罩 click（下方已有 drawerBackdrop click 关抽屉，这里补上关弹窗）
drawerBackdrop.addEventListener('click', closeBuyModal);

function bindBuyToggle(el, key, sideEffect) {
  el.addEventListener('change', () => {
    if (autoMode || balls.length > 0 || pendingSettles > 0) {
      // 投注中不允许修改，回滚开关
      el.checked = window.buyFeatures[key];
      showToast('投注进行中，暂不可修改');
      return;
    }
    window.buyFeatures[key] = el.checked;
    refreshBuyBtnBadge();
    if (sideEffect) sideEffect();
  });
}
bindBuyToggle(tglSplit, 'split', () => {
  // 分裂钉启停：重绘钉板
  if (typeof drawBoard === 'function') drawBoard();
});
bindBuyToggle(tglRespin, 'respin', () => {
  // 重建槽位以刷新球衣标记
  if (typeof rebuildSlotDom === 'function') { rebuildSlotDom(); }
});
bindBuyToggle(tglHiMult, 'hiMult', () => {
  // 重绘球门以显示/隐藏高倍率球
  if (typeof drawDome === 'function') drawDome();
  // 左上角倍率图例同步显隐
  const legend = document.getElementById('multLegend');
  if (legend) {
    const on = !!(window.buyFeatures && window.buyFeatures.hiMult);
    legend.classList.toggle('show', on);
    legend.setAttribute('aria-hidden', on ? 'false' : 'true');
  }
});

// 投注切换时同步弹窗费用 + 按钮费用
document.querySelectorAll('.ctrl-bet .sel-arrow').forEach(btn => {
  btn.addEventListener('click', () => setTimeout(() => {
    refreshBuyCosts();
    refreshBuyBtnBadge();
  }, 0));
});

// 音乐开关
toggleMusic.addEventListener('change', () => {
  musicOn = toggleMusic.checked;
  if (bgAudio) {
    if (musicOn) bgAudio.play().catch(() => {});
    else bgAudio.pause();
  }
});

// 音效开关
toggleSfx.addEventListener('change', () => {
  sfxOn = toggleSfx.checked;
});

// 第一次用户交互时启动音频（浏览器自动播放策略）
document.addEventListener('click', () => getAudioCtx(), { once: true });
</script>

<script>
// ══════════════════════════════════════════════
//  粒子系统 + SPLIT! 飘字（挂在 initGame 之后）
// ══════════════════════════════════════════════
(function patchGame() {
  // 等 initGame 完成后再 patch
  const canvas = document.getElementById('board');
  if (!canvas) return;

  // ── 粒子池 ──
  const particles = [];

  function spawnSplitParticles(x, y) {
    const colors = ['#00eeff', '#80ffee', '#ffffff', '#ffe080', '#00ccff'];
    for (let i = 0; i < 28; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        life: 1,
        decay: 0.025 + Math.random() * 0.02,
        r: 2 + Math.random() * 3,
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }
  }

  // ── 每帧更新粒子（叠加在 canvas 上层）──
  const dpr = window.devicePixelRatio || 1;
  function drawParticles() {
    if (particles.length === 0) return;
    const ctx = canvas.getContext('2d');
    // 只绘制，不清空（清空由 drawBoard 做）
    ctx.save();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.12; // 粒子重力
      p.vx *= 0.97;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 6; ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ── SPLIT! 飘字 ──
  function showSplitText(canvasX, canvasY) {
    const boardEl = document.querySelector('.board-wrap');
    const canvasEl = document.getElementById('board');
    const boardRect = boardEl.getBoundingClientRect();
    const canvasRect = canvasEl.getBoundingClientRect();

    const scaleX = canvasRect.width / 390;
    const scaleY = canvasRect.height / (canvasEl.height / dpr);

    const el = document.createElement('div');
    el.className = 'float-split';
    el.textContent = '分裂！';

    const px = canvasRect.left - boardRect.left + canvasX * scaleX;
    const py = canvasRect.top  - boardRect.top  + canvasY * scaleY;

    const wrap = document.createElement('div');
    wrap.style.cssText = `position:absolute;left:${px}px;top:${py}px;pointer-events:none;z-index:30;`;
    wrap.appendChild(el);
    boardEl.appendChild(wrap);
    setTimeout(() => wrap.remove(), 1300);
  }

  // ── Patch: 拦截 requestAnimationFrame 渲染循环，在每帧末尾绘制粒子 ──
  const origRAF = window.requestAnimationFrame.bind(window);
  window.requestAnimationFrame = function(cb) {
    return origRAF(function(ts) {
      cb(ts);
      drawParticles();
    });
  };

  // ── 暴露全局函数供 initGame 内部调用 ──
  window._onSplit = function(x, y) {
    spawnSplitParticles(x, y);
    showSplitText(x, y - 10);
    playSplitSfx();
  };
  window._onHit = function() {
    playHitSfx();
  };
  window._onWin = function(mult) {
    playWinSfx(mult);
  };
})();
</script>
