<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCKY DROP — UI Mockup v2</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   Design Tokens — 日光明亮体育场（Sky Blue + Pitch Green + Cyan）
   ════════════════════════════════════════════════════════ */
:root {
  /* 天空 / 外场背景（明亮日光，介于首版刺眼与上版太暗之间） */
  --sky-top:       #2f7bc4;
  --sky-mid:       #1c5596;
  --sky-bot:       #0e3a72;
  --sky-deep:      #072149;

  /* 草坪（明亮自然绿，比深沉版亮约 30%） */
  --pitch-light:   #5fb344;
  --pitch-mid:     #4fa138;
  --pitch-dark:    #408a2c;
  --pitch-deeper:  #2d6820;
  --pitch-line:    rgba(255,255,255,0.72);
  --pitch-wall:    #93bfe0;
  --pitch-wall-d:  #2a6bb4;

  /* 钉子（和草坪匹配，略提亮） */
  --peg-body:      #d0e2b8;
  --peg-mid:       #aec893;
  --peg-edge:      #7f9868;

  /* UI 蓝胶囊（明亮但不再霓虹色） */
  --ui-blue-top:   #3d93d8;
  --ui-blue-mid:   #1f6aac;
  --ui-blue-bot:   #0d4a88;
  --ui-blue-edge:  #082a54;
  --ui-blue-deep:  #041531;
  --ui-highlight:  rgba(255,255,255,0.48);

  /* 灰蓝（OFF 态） */
  --ui-grey-top:   #8ba0bf;
  --ui-grey-bot:   #4a5a75;

  /* 倍率 cyan 发光 */
  --accent-cyan:   #4dd0e1;
  --accent-cyan-g: #80e6f5;
  --accent-cyan-d: #1a8a9c;

  /* 文字 */
  --text-primary:  #ffffff;
  --text-stroke:   #0d3b75;
  --text-gold:     #ffd54a;
  --text-gold-d:   #c88b16;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background:
    radial-gradient(ellipse at 50% 20%, #3a86cc 0%, #1a5390 55%, #072149 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 48px;
  font-family: 'Chakra Petch', sans-serif;
}

.page-label {
  color: rgba(220,240,255,0.55);
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

/* ─── Device ─── */
.device {
  width: 390px;
  height: 844px;              /* iPhone 14 逻辑高度，固定不变 */
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bot) 85%, var(--sky-deep) 100%);
  border-radius: 44px;
  border: 6px solid var(--ui-blue-edge);
  overflow: hidden;
  position: relative;         /* 底部抽屉 / backdrop / toast 基于此定位 */
  box-shadow:
    0 0 0 1px rgba(120,190,255,0.35),
    0 32px 120px rgba(10,40,90,0.45),
    0 0 60px rgba(80,160,240,0.3);
}

/* Status bar */
.status {
  height: 34px;
  background: linear-gradient(180deg, rgba(13,59,117,0.85), rgba(13,59,117,0.7));
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  font-size: 11px;
  color: rgba(230,245,255,0.85);
  font-family: 'Space Mono', monospace;
}



/* ─── Header ─── */
.header {
  height: 54px;
  background: linear-gradient(180deg, var(--ui-blue-bot) 0%, var(--ui-blue-deep) 100%);
  border-bottom: 1px solid rgba(150,200,255,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px 0 18px;      /* 右侧 padding 减小，让齿轮更贴边 */
  box-shadow: 0 2px 6px rgba(0,30,80,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
}
.hdr-icons { display: flex; align-items: center; gap: 22px; }   /* 加大余额与齿轮的间距 */
.hdr-icon {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: linear-gradient(180deg, var(--ui-blue-top) 0%, var(--ui-blue-mid) 55%, var(--ui-blue-bot) 100%);
  border: 1px solid rgba(255,255,255,0.35);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 var(--ui-highlight),
    inset 0 -2px 3px rgba(0,30,80,0.35),
    0 2px 4px rgba(0,20,60,0.35);
  transition: filter .18s, transform .18s;
}
.hdr-icon:hover { filter: brightness(1.12); transform: scale(1.06); }
.hdr-icon:active { transform: scale(0.95); }
.hdr-icon svg { width: 18px; height: 18px; fill: #fff; filter: drop-shadow(0 1px 1px rgba(0,20,60,0.5)); }
.logo-wrap { display: flex; flex-direction: column; gap: 2px; }
.sub-chest { width: 16px; height: 19px; vertical-align: middle; margin: 0 3px 2px; filter: drop-shadow(0 0 4px rgba(255,215,90,0.9)); }
.logo-sub {
  font-size: 11px;
  letter-spacing: 0.5px;
  color: rgba(230,245,255,0.9);
  font-weight: 600;
  line-height: 1;
}
.logo-sub em {
  font-style: normal;
  color: var(--text-gold);
  font-weight: 700;
  text-shadow: 0 0 10px rgba(255,220,60,0.9), 0 0 20px rgba(255,180,0,0.5);
}
.logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2.8px;
  color: #ffffff;
  text-shadow:
    0 1px 0 var(--ui-blue-edge),
    0 2px 0 var(--ui-blue-edge),
    0 3px 4px rgba(0,20,60,0.55),
    0 0 12px rgba(150,210,255,0.4);
  white-space: nowrap;
}
.logo .logo-golden {
  color: var(--text-gold);
  text-shadow:
    0 1px 0 #7a4a00,
    0 2px 0 #5a3400,
    0 3px 5px rgba(60,30,0,0.6),
    0 0 10px rgba(255,210,70,0.5);
}
/* ─── 底部余额条 ─── */
.footer-balance {
  flex-shrink: 0;
  background: linear-gradient(180deg, var(--ui-blue-bot) 0%, var(--ui-blue-deep) 100%);
  border-top: 1px solid rgba(150,200,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 16px 12px;
  position: relative;
  z-index: 5;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
}
.balance-wrap {
  display: inline-flex;
  align-items: baseline;
  gap: 10px;
  position: relative;
}
.bal-label {
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(200,225,255,0.8);
  font-weight: 700;
  text-transform: uppercase;
}
.bal-value {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-gold);
  text-shadow:
    0 1px 0 #6a3a00,
    0 0 10px rgba(255,200,50,0.75),
    0 0 22px rgba(255,180,0,0.35);
  letter-spacing: 0.5px;
}
@keyframes balFloat {
  0%   { opacity: 1; transform: translateY(0)    scale(1); }
  15%  { opacity: 1; transform: translateY(-4px)  scale(1.1); }
  100% { opacity: 0; transform: translateY(-28px) scale(0.9); }
}
.bal-float {
  position: absolute;
  right: 0;
  top: -4px;
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: #ffe855;
  white-space: nowrap;
  pointer-events: none;
  animation: balFloat 2s ease-out forwards;
  text-shadow: 0 0 8px rgba(255,220,50,0.95), 0 0 20px rgba(255,180,0,0.6), 0 1px 3px rgba(0,0,0,0.8);
  z-index: 30;
}

/* ─── History Bar ─── */
.history-bar {
  display: flex;
  align-items: center;
  background: linear-gradient(180deg, var(--ui-blue-deep) 0%, var(--sky-bot) 100%);
  border-bottom: 1px solid rgba(150,200,255,0.2);
  padding: 5px 8px;
  gap: 5px;
  overflow: hidden;
  box-shadow: inset 0 -1px 0 rgba(0,20,60,0.3);
}
.hist-list {
  display: flex;
  gap: 5px;
  flex: 1;
  overflow-x: auto;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.hist-list::-webkit-scrollbar { display: none; }
.hist-badge {
  flex-shrink: 0;
  height: 26px;
  padding: 0 8px;
  border-radius: 7px;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 1px 4px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
}

/* 历史倍率：与底部槽位共享色阶（每档 h-* 与对应的 .s-* .slot-bar 保持同一渐变） */

/* h-low ↔ s-low — 粉蓝白 */
.hist-badge.h-low {
  background: linear-gradient(180deg, #b0c9d8 0%, #7a98b0 45%, #4d6a85 100%);
  border-color: rgba(180,210,230,0.5);
  color: #f0f6fb;
  text-shadow: 0 1px 1px rgba(0,20,40,0.35);
}
/* h-mid ↔ s-neutral — 淡青 */
.hist-badge.h-mid {
  background: linear-gradient(180deg, #9fe5ef 0%, #5bc4d6 45%, #2a8a9c 100%);
  border-color: rgba(150,220,230,0.55);
  color: #eafaff;
  text-shadow: 0 1px 1px rgba(0,40,55,0.4);
  box-shadow: 0 1px 4px rgba(90,200,220,0.25), inset 0 1px 0 rgba(255,255,255,0.35);
}
/* h-good ↔ s-warm — 标准 cyan */
.hist-badge.h-good {
  background: linear-gradient(180deg, var(--accent-cyan-g) 0%, var(--accent-cyan) 45%, var(--accent-cyan-d) 100%);
  border-color: rgba(180,235,245,0.6);
  color: #ebfeff;
  text-shadow: 0 1px 1px rgba(0,40,55,0.45);
  box-shadow: 0 1px 5px rgba(77,208,225,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
}
/* h-great ↔ s-yellow — 青黄 */
.hist-badge.h-great {
  background: linear-gradient(180deg, #d8f080 0%, #a8d850 45%, #6fa028 100%);
  border-color: rgba(220,240,160,0.65);
  color: #fbffe0;
  text-shadow: 0 1px 1px rgba(45,60,0,0.45);
  box-shadow: 0 1px 5px rgba(190,230,100,0.3), inset 0 1px 0 rgba(255,255,220,0.4);
}
/* h-orange ↔ s-orange — 琥珀橙 */
.hist-badge.h-orange {
  background: linear-gradient(180deg, #ffd080 0%, #ffa840 45%, #c27000 100%);
  border-color: rgba(255,215,140,0.7);
  color: #fff8e4;
  text-shadow: 0 1px 1px rgba(90,45,0,0.5);
  box-shadow: 0 1px 5px rgba(255,170,70,0.35), inset 0 1px 0 rgba(255,240,200,0.4);
}
/* h-high ↔ s-high — 亮红 */
.hist-badge.h-high {
  background: linear-gradient(180deg, #ff9080 0%, #ff5030 45%, #b02810 100%);
  border-color: rgba(255,170,150,0.7);
  color: #fff2ec;
  text-shadow: 0 1px 1px rgba(80,10,0,0.5);
  box-shadow: 0 1px 6px rgba(255,100,80,0.4), inset 0 1px 0 rgba(255,220,205,0.4);
}
/* h-jackpot ↔ s-jackpot — 洋红紫 */
.hist-badge.h-jackpot {
  background: linear-gradient(180deg, #ff95d0 0%, #e040a0 45%, #8a1066 100%);
  border-color: rgba(255,190,225,0.8);
  color: #fff0f7;
  text-shadow: 0 1px 1px rgba(70,5,40,0.5);
  box-shadow: 0 1px 7px rgba(240,80,170,0.45), inset 0 1px 0 rgba(255,225,240,0.45);
}
/* h-mega ↔ s-mega — 暖金 */
.hist-badge.h-mega {
  background: linear-gradient(180deg, #fff2a0 0%, #ffc838 45%, #c78810 100%);
  border-color: rgba(255,235,150,0.85);
  color: #4a2f00;
  text-shadow: 0 1px 0 rgba(255,240,180,0.6);
  box-shadow: 0 1px 8px rgba(255,200,60,0.5), inset 0 1px 0 rgba(255,245,200,0.5);
}

/* ─── 球门发球区 ─── */
.machine-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: transparent;
  padding: 6px 0 0;
  margin-bottom: 0;
  position: relative;
  z-index: 4;
  width: 100%;
  pointer-events: none;  /* 视觉层，不拦截下层点击事件 */
}

/* 球门区：使用 goal.png 作为完整 3D 透视球门贴图（含前框/后框/连接杆/顶侧后网） */
.dome-shell {
  width: 108px;    /* 球门宽（基准，稍放大）*/
  height: 45px;    /* 球门高 ≈ 108 / 2.4 */
  border-radius: 0;
  position: relative;
  overflow: visible;
  background: url('goal.png') center/100% 100% no-repeat;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
}
.dome-shell::before { content: none; }
.dome-shell canvas {
  display: block;
  /* 对齐 PNG 前框内部区域：PNG 前框内 L=90/1200=7.5%, R=1110/1200=92.5%, T=70/500=14%, B=450/500=90% */
  position: absolute;
  left: 7.5%;
  top: 14%;
  width: 85%;
  height: 76%;
  z-index: 3;
}
.dome-shell::after { content: none; }

/* 球门横梁下接的草坪过渡 */
.dome-base {
  width: 100%;
  height: 4px;
  background: transparent;
  margin-top: 0;
}
.dome-crossbar { display: none; }



/* ─── 飘字动画 ─── */
@keyframes floatUp {
  0%   { opacity: 1;   transform: translateY(0)    scale(1); }
  20%  { opacity: 1;   transform: translateY(-12px) scale(1.1); }
  100% { opacity: 0;   transform: translateY(-64px) scale(0.85); }
}
.float-win {
  position: relative;
  pointer-events: none;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  z-index: 20;
  animation: floatUp 1.4s ease-out forwards;
  text-shadow:
    0 0 8px rgba(255,220,50,0.9),
    0 0 16px rgba(255,160,0,0.6),
    0 2px 4px rgba(0,0,0,0.8);
}
.float-win.jackpot {
  font-size: 18px;
  color: #ffe855;
  text-shadow:
    0 0 10px rgba(255,220,50,1),
    0 0 22px rgba(255,180,0,0.8),
    0 2px 4px rgba(0,0,0,0.9);
}
.float-win.mega {
  font-size: 22px;
  color: #f0a0ff;
  text-shadow:
    0 0 12px rgba(220,80,255,1),
    0 0 28px rgba(180,40,255,0.9),
    0 2px 4px rgba(0,0,0,0.9);
}

/* ─── Peg Board ─── */
.row-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  background: #8030c0;
  color: #fff;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 8px;
  z-index: 10;
  letter-spacing: 2px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  pointer-events: none;
}
.board-wrap {
  position: relative;
  z-index: 1;
  overflow: visible;
  /* 保底色：与 canvas 底部填充的终止色对齐（深蓝），避免像素级漏缝 */
  background: var(--ui-blue-deep);
}
.board-canvas {
  display: block;
  width: 100%;
}

/* ─── 高倍率球图例（左上角说明条，仅 hiMult 打开时显示）─── */
.mult-legend {
  position: absolute;
  top: 6px;
  left: 6px;
  z-index: 12;
  display: none;
  align-items: center;
  gap: 7px;
  padding: 4px 10px 4px 8px;
  background: linear-gradient(180deg,
    rgba(10,35,72,0.72) 0%,
    rgba(6,24,54,0.78) 100%);
  border: 1px solid rgba(180,210,240,0.38);
  border-radius: 999px;
  box-shadow:
    0 2px 5px rgba(0,10,30,0.5),
    inset 0 1px 0 rgba(255,255,255,0.16);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  font-family: 'Chakra Petch', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-weight: 800;
  font-size: 11px;
  color: #fff;
  letter-spacing: 0.02em;
  text-shadow: 0 1px 2px rgba(0,15,40,0.7);
  pointer-events: none;
  user-select: none;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity .28s ease, transform .28s ease;
}
.mult-legend.show {
  display: inline-flex;
  opacity: 1;
  transform: translateY(0);
}
.ml-item {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.ml-ball {
  position: relative;
  display: inline-block;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff url('ball1.jpg') center/cover no-repeat;
  border: 1px solid rgba(0,15,40,0.45);
  box-shadow:
    0 1px 2px rgba(0,10,30,0.55),
    inset 0 1px 1px rgba(255,255,255,0.3);
}
/* 红/金色球：用半透明色层叠加在贴图上，保留六边形纹理 */
.ml-b-red::after,
.ml-b-gold::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
}
.ml-b-red::after {
  background: rgba(230,60,60,0.72);
  box-shadow:
    inset 0 0 0 1px rgba(255,130,130,0.6),
    0 0 5px rgba(255,60,60,0.55);
}
.ml-b-gold::after {
  background: rgba(255,200,40,0.70);
  box-shadow:
    inset 0 0 0 1px rgba(255,235,120,0.7),
    0 0 5px rgba(255,200,60,0.65);
}

/* ─── Bottom Slots ─── */
/* ─── 倍率槽（cyan 发光条）─── */
.slots {
  display: flex;
  background:
    linear-gradient(180deg,
      var(--ui-blue-deep) 0%,
      #061f44 45%,
      #03152e 100%);
  padding: 0 10px 10px;
  gap: 4px;
  position: relative;
  margin-top: -8px;  /* 倍率条整体向上挤入 canvas 底部草坪区，更紧凑 */
  box-shadow: inset 0 1px 0 rgba(120,190,255,0.2);
}

/* 槽位容器：上下两部分——蓝色灯条 + 白色数字 */
.slot {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  line-height: 1;
  font-family: 'Chakra Petch', sans-serif;
  cursor: pointer;
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0;
  height: auto;
  overflow: visible;
  transition: transform .12s;
  position: relative;
}
.slot::before { display: none; }  /* 移除旧反光条 */

/* 灯条通用样式：cyan 发光条风格（参考图） */
.slot .slot-bar {
  width: 100%;
  height: 14px;
  border-radius: 4px;
  border: 1px solid rgba(200,245,255,0.55);
  position: relative;
  background: linear-gradient(180deg, var(--accent-cyan-g) 0%, var(--accent-cyan) 45%, var(--accent-cyan-d) 100%);
  box-shadow:
    0 0 var(--slot-glow, 8px) var(--slot-glow-c, rgba(77,208,225,0.6)),
    inset 0 1px 0 rgba(255,255,255,0.7),
    inset 0 -2px 2px rgba(0,60,80,0.3);
}
/* 灯条中部细高光 */
.slot .slot-bar::after {
  content: '';
  position: absolute;
  left: 15%; right: 15%;
  top: 2px;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
}

/* 下方倍率文字：白色 + 深蓝描边（不用金色） */
.slot .slot-val {
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.3px;
  text-shadow:
    -1px 0 var(--ui-blue-edge),
    1px 0 var(--ui-blue-edge),
    0 -1px var(--ui-blue-edge),
    0 1px var(--ui-blue-edge),
    0 2px 3px rgba(0,0,0,0.5);
  white-space: nowrap;
}

/* ─── 7 档色阶：都用 cyan 基调，仅通过饱和度/发光强度区分 ─── */

/* 极低 — 低饱和冷灰蓝 */
.s-low .slot-bar {
  background: linear-gradient(180deg, #b0c9d8 0%, #7a98b0 45%, #4d6a85 100%);
  border-color: rgba(180,210,230,0.5);
  --slot-glow: 4px; --slot-glow-c: rgba(140,180,210,0.35);
}

/* 1× 中性 — 淡 cyan */
.s-neutral .slot-bar {
  background: linear-gradient(180deg, #9fe5ef 0%, #5bc4d6 45%, #2a8a9c 100%);
  --slot-glow: 6px; --slot-glow-c: rgba(90,200,220,0.55);
}

/* 稍好 — 标准 cyan */
.s-warm .slot-bar {
  background: linear-gradient(180deg, var(--accent-cyan-g) 0%, var(--accent-cyan) 45%, var(--accent-cyan-d) 100%);
  --slot-glow: 8px; --slot-glow-c: rgba(77,208,225,0.7);
}

/* 小赚 — 青黄 */
.s-yellow .slot-bar {
  background: linear-gradient(180deg, #d8f080 0%, #a8d850 45%, #6fa028 100%);
  border-color: rgba(220,240,160,0.65);
  --slot-glow: 8px; --slot-glow-c: rgba(190,230,100,0.65);
}

/* 中赚 — 琥珀橙 */
.s-orange .slot-bar {
  background: linear-gradient(180deg, #ffd080 0%, #ffa840 45%, #c27000 100%);
  border-color: rgba(255,215,140,0.7);
  --slot-glow: 9px; --slot-glow-c: rgba(255,170,70,0.7);
}

/* 大赚 — 亮红 */
.s-high .slot-bar {
  background: linear-gradient(180deg, #ff9080 0%, #ff5030 45%, #b02810 100%);
  border-color: rgba(255,170,150,0.7);
  --slot-glow: 10px; --slot-glow-c: rgba(255,100,80,0.75);
}

/* 巨奖 — 洋红紫 */
.s-jackpot .slot-bar {
  background: linear-gradient(180deg, #ff95d0 0%, #e040a0 45%, #8a1066 100%);
  border-color: rgba(255,190,225,0.8);
  --slot-glow: 11px; --slot-glow-c: rgba(240,80,170,0.75);
  animation: slotPulseJack 2.2s ease-in-out infinite;
}
@keyframes slotPulseJack {
  0%,100% { box-shadow: 0 0 8px rgba(240,80,170,0.5), inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -1px 0 rgba(0,20,40,0.2); }
  50%     { box-shadow: 0 0 18px rgba(255,130,200,0.85), inset 0 1px 0 rgba(255,255,255,0.75), inset 0 -1px 0 rgba(0,20,40,0.2); }
}

/* 超巨奖 — 暖金（亮版） */
.s-mega .slot-bar {
  background: linear-gradient(180deg, #fff2a0 0%, #ffc838 45%, #c78810 100%);
  border-color: rgba(255,235,150,0.85);
  --slot-glow: 12px; --slot-glow-c: rgba(255,200,60,0.8);
  animation: slotPulseMega 1.8s ease-in-out infinite;
}
@keyframes slotPulseMega {
  0%,100% { box-shadow: 0 0 10px rgba(255,200,60,0.55), inset 0 1px 0 rgba(255,255,210,0.7), inset 0 -1px 0 rgba(60,30,0,0.25); }
  50%     { box-shadow: 0 0 22px rgba(255,220,120,0.9), inset 0 1px 0 rgba(255,255,210,0.85), inset 0 -1px 0 rgba(60,30,0,0.25); }
}


/* ─── Controls（明亮蓝色控制台，严格三列对齐） ─── */
.controls {
  flex: 1;
  background:
    linear-gradient(180deg,
      rgba(7,33,73,0) 0%,
      var(--sky-bot) 20%,
      var(--sky-deep) 70%,
      #041326 100%);
  display: grid;
  /* 三列：左 114 | 中 110（开始）| 右 114；总 350px = 378 内宽 - 28 padding */
  grid-template-columns: 114px 110px 114px;
  grid-template-rows: 50px 50px 50px;   /* 三行等高，特色功能与下方控件一致 */
  column-gap: 6px;
  row-gap: 10px;
  padding: 12px 14px 14px;
  justify-content: center;
  align-items: center;
  align-content: start;   /* 禁用行拉伸：flex:1 带来的多余空间堆到底部，不塞进 row 1 */
  border-top: 1px solid rgba(140,180,225,0.18);
  position: relative;
}
.controls::before { content: none; }

/* ─── 通用面板：扁平深蓝胶囊，每格 114×50 对齐 ─── */
.ctrl-sel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;         /* 填满 grid 列（114px） */
  height: 100%;        /* 填满 grid 行（50px） */
  padding: 0 6px;
  gap: 2px;
  background: linear-gradient(180deg,
    rgba(61,147,216,0.48) 0%,
    rgba(31,106,172,0.52) 55%,
    rgba(13,74,136,0.58) 100%);
  border: 1px solid rgba(180,210,240,0.22);
  border-radius: 12px;
  box-shadow:
    0 2px 5px rgba(0,15,40,0.35),
    inset 0 1px 0 rgba(255,255,255,0.14);
  position: relative;
  overflow: visible;
  transition: background .15s, border-color .15s;
  backdrop-filter: blur(2px);
}
.ctrl-sel::before { content: none; }
.ctrl-sel:hover { background: linear-gradient(180deg, rgba(61,147,216,0.7), rgba(31,106,172,0.72) 55%, rgba(13,74,136,0.78)); }
.ctrl-sel:active { background: linear-gradient(180deg, rgba(13,74,136,0.85), rgba(6,37,73,0.9)); }

/* grid 布局定位（新三列网格：1=左 / 2=中 / 3=右） */
.feature-buy-btn { grid-column: 1 / -1; grid-row: 1; }
.ctrl-rows   { grid-column: 1; grid-row: 2; }
.ctrl-bet    { grid-column: 3; grid-row: 2; }
.ctrl-risk   { grid-column: 1; grid-row: 3; }
.ctrl-auto   { grid-column: 3; grid-row: 3; }
.start-btn   { grid-column: 2; grid-row: 2 / 4; }

/* ─── 难度面板：与自动投注等高同字号 ─── */
.controls .ctrl-risk .sel-value.sel-risk-label {
  font-size: 18px;        /* 比自动投注 sel-value (19px) 小 1px */
  letter-spacing: 0.04em;
  transition: color .2s;
  /* font-weight/family/text-shadow/line-height/white-space 继承基础 .sel-value */
}

/* ─── 箭头按钮：扁平雪佛龙（不再是独立小球） ─── */
.sel-arrow {
  width: 26px; height: 26px;
  background: transparent;
  border: none;
  color: rgba(220,235,255,0.75);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Chakra Petch', sans-serif;
  padding: 0;
  line-height: 1;
  position: relative;
  z-index: 1;
  transition: color .12s, transform .1s;
}
.sel-arrow:hover { color: #fff; }
.sel-arrow:active { transform: scale(0.88); color: rgba(160,200,240,0.85); }
.sel-arrow:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ─── 中间信息区 ─── */
.sel-info {
  flex: 1;
  text-align: center;
  line-height: 1;
  position: relative;
  z-index: 1;
}
/* 标签悬浮在胶囊上方（独立小标签片） */
.sel-label {
  position: absolute;
  left: 50%;
  top: -14px;
  transform: translateX(-50%);
  display: inline-block;
  font-size: 10px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 1px;
  padding: 2px 10px;
  background: linear-gradient(180deg, var(--ui-blue-top) 0%, var(--ui-blue-bot) 100%);
  border: 1px solid var(--ui-blue-edge);
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(0,20,50,0.4), inset 0 1px 0 rgba(255,255,255,0.45);
  white-space: nowrap;
  font-family: 'Chakra Petch', 'PingFang SC', sans-serif;
  text-shadow: 0 1px 1px var(--ui-blue-edge);
  z-index: 3;
  margin-bottom: 0;
}
.sel-value {
  display: block;
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  font-family: 'Chakra Petch', sans-serif;
  line-height: 1;
  text-shadow:
    -1px 0 var(--ui-blue-edge),
    1px 0 var(--ui-blue-edge),
    0 -1px var(--ui-blue-edge),
    0 1px var(--ui-blue-edge),
    0 2px 3px rgba(0,20,50,0.6);
}
.sel-value-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 6px;
}
.sel-icon-group {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 17px;
}
.sel-icon-group span {
  opacity: 0.3;
  transition: all .18s;
  filter: grayscale(1);
}
.sel-icon-group span.active {
  opacity: 1;
  filter: none;
  text-shadow: 0 0 8px rgba(255,120,40,0.9);
}

/* 开始按钮：真实经典黑白足球（canvas 重绘） */
.start-btn {
  width: 110px;
  align-self: center;
  justify-self: center;
  height: 110px;
  /* play-circle.png 已经用 Python 把球体抠成圆（透明角落），贴满即可 */
  background: transparent url('play-circle.png') center/100% 100% no-repeat;
  border: none;
  border-radius: 50%;
  color: #ffffff;
  cursor: pointer;
  /* 外发光 + 投影：让按钮从深蓝背景跳出来 */
  filter:
    drop-shadow(0 6px 14px rgba(0,10,30,0.6))
    drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  position: relative;
  z-index: 2;
  transition: transform .12s, filter .15s;
  padding: 0;
}
.start-btn:hover {
  filter:
    drop-shadow(0 8px 18px rgba(0,10,30,0.7))
    drop-shadow(0 3px 6px rgba(0,0,0,0.5))
    brightness(1.08);
  transform: translateY(-1px);
}
.start-btn:active { transform: scale(0.96); }

/* 停止态：切换到 stop-circle.png（已自带 STOP 烫印） */
.start-btn.stopping {
  background: transparent url('stop-circle.png') center/100% 100% no-repeat;
  filter:
    drop-shadow(0 6px 14px rgba(80,0,0,0.55))
    drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
.start-btn.stopping:hover {
  filter:
    drop-shadow(0 8px 18px rgba(80,0,0,0.65))
    drop-shadow(0 3px 6px rgba(0,0,0,0.5))
    brightness(1.08);
}

/* span 隐藏——PLAY / STOP 已烫印在 PNG 上，不需要文字覆盖 */
.start-btn span {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
}

@keyframes shine {
  0%    { left: -60%; }
  40%,100% { left: 130%; }
}

/* ─── Footer ─── */
.footer {
  height: 34px;
  background: var(--ui-blue-deep);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-top: 1px solid rgba(150,200,255,0.15);
}
.f-user { font-size: 9px; color: #1f3a5a; letter-spacing: 1px; }
.f-demo { font-size: 9px; color: #15293f; letter-spacing: 1px; }

/* ─── 右上角「行数」浮动控件（与下方控件区样式统一） ─── */
.side-panel {
  position: absolute;
  top: 12px;
  right: 10px;
  z-index: 15;
  pointer-events: auto;
}
/* 蓝色记分胶囊（同控件区） */
.side-panel .ctrl-sel {
  display: flex;
  align-items: center;
  height: auto;
  padding: 5px 5px;
  background: linear-gradient(180deg, var(--ui-blue-top) 0%, var(--ui-blue-mid) 50%, var(--ui-blue-bot) 100%);
  border: 1.5px solid var(--ui-blue-edge);
  border-radius: 22px;
  box-shadow:
    0 3px 0 var(--ui-blue-edge),
    0 4px 8px rgba(0,20,50,0.4),
    inset 0 1px 0 var(--ui-highlight),
    inset 0 -2px 3px rgba(7,42,90,0.35);
  gap: 3px;
  overflow: visible;
}
.side-panel .ctrl-sel::before { display: none; }
/* 紧凑蓝色按键 */
.side-panel .sel-arrow {
  width: 26px; height: 26px;
  background: linear-gradient(180deg, #9bd4ff 0%, #4aa8f5 50%, #1565c0 100%);
  border: 1px solid var(--ui-blue-edge);
  border-radius: 50%;
  color: #fff;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 1px 2px rgba(0,20,50,0.3);
  text-shadow: 0 1px 1px var(--ui-blue-edge);
  transition: filter .15s;
}
.side-panel .sel-arrow:hover { filter: brightness(1.12); }
.side-panel .sel-arrow:disabled { opacity: 0.35; cursor: not-allowed; }
/* 中间信息（side-panel 内置标签，非悬浮） */
.side-panel .sel-info {
  text-align: center;
  padding: 0 6px;
  min-width: 36px;
}
.side-panel .sel-label {
  position: static;
  transform: none;
  background: none;
  border: none;
  box-shadow: none;
  padding: 0;
  font-size: 9.5px;
  letter-spacing: 1px;
  margin-bottom: 2px;
  color: rgba(220,240,255,0.95);
  font-family: 'Chakra Petch', 'PingFang SC', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  text-shadow: 0 1px 1px var(--ui-blue-edge);
  display: block;
  border-radius: 0;
}
.side-panel .sel-value {
  font-size: 16px;
  font-weight: 900;
  color: #fff;
  text-shadow:
    -1px 0 var(--ui-blue-edge),
    1px 0 var(--ui-blue-edge),
    0 -1px var(--ui-blue-edge),
    0 1px var(--ui-blue-edge),
    0 2px 2px rgba(0,20,50,0.5);
}
/* ─── 特色功能条（蓝色胶囊风格） ─── */
.feature-buy-btn {
  width: 100%;
  justify-self: stretch;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-radius: 14px;
  cursor: pointer;
  position: relative;
  font-family: 'Chakra Petch', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg,
    rgba(46,120,184,0.55) 0%,
    rgba(24,87,147,0.55) 55%,
    rgba(10,58,112,0.55) 100%);
  border: 1px solid rgba(180,210,240,0.18);
  box-shadow:
    0 2px 6px rgba(0,10,30,0.35),
    inset 0 1px 0 rgba(255,255,255,0.12);
  transition: background .15s;
  color: #fff;
  backdrop-filter: blur(2px);
}
.feature-buy-btn:hover { background: linear-gradient(180deg, rgba(46,120,184,0.75), rgba(24,87,147,0.75) 55%, rgba(10,58,112,0.75)); }
.feature-buy-btn:active { background: linear-gradient(180deg, rgba(10,58,112,0.85), rgba(5,31,63,0.9)); }

/* 左侧：特色功能 label + 图标 */
.fb-left {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-right: 14px;
  min-width: 0;
}
.fb-label {
  font-size: 15px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
  white-space: nowrap;
  text-shadow: 0 1px 2px var(--ui-blue-edge);
}
.fb-icons {
  display: flex;
  align-items: center;
  gap: 7px;
}
.feature-buy-btn .bf-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(7,42,90,0.5);
  border: 1px solid rgba(200,230,255,0.35);
  color: rgba(230,245,255,0.55);
  display: inline-flex;
  align-items: center; justify-content: center;
  transition: all .18s;
}
.feature-buy-btn .bf-icon svg { width: 16px; height: 16px; fill: currentColor; }
.feature-buy-btn .bf-icon.on {
  background: linear-gradient(180deg, #ffe27a 0%, #e3a63a 100%);
  border-color: rgba(255,230,130,0.95);
  color: #3a1f00;
  box-shadow: 0 0 10px rgba(255,210,90,0.7), inset 0 1px 0 rgba(255,255,255,0.55);
}

/* 中缝分隔线 */
.fb-divider {
  width: 1px;
  height: 32px;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(255,255,255,0.55) 30%,
    rgba(255,255,255,0.55) 70%,
    transparent 100%);
}

/* 右侧：总投注 */
.fb-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding-left: 14px;
  min-width: 0;
}
.fb-total-label {
  font-size: 14px;
  font-weight: 700;
  color: rgba(220,240,255,0.85);
  letter-spacing: 0.3px;
  white-space: nowrap;
  text-shadow: 0 1px 1px var(--ui-blue-edge);
}
.fb-total-val {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--text-gold);
  letter-spacing: 0.02em;
  text-shadow:
    -1px 0 var(--ui-blue-edge),
    1px 0 var(--ui-blue-edge),
    0 1px var(--ui-blue-edge),
    0 0 8px rgba(255,200,90,0.3);
  white-space: nowrap;
}
/* 有附加功能时 总投注数字稍微亮一点，暗示已加成 */
.feature-buy-btn.active .fb-total-val {
  color: #ffe89a;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6), 0 0 10px rgba(255,215,100,0.5);
}

/* 未激活任何特色功能：只显示左侧（特色功能 + 图标），隐藏竖线与总投注 */
.feature-buy-btn:not(.active) .fb-divider,
.feature-buy-btn:not(.active) .fb-right {
  display: none;
}
/* 激活态：竖线紧贴在左右两组之间（flex 已处理对齐） */
.feature-buy-btn.active .fb-divider {
  margin: 0 2px;
  flex: 0 0 1px;
}

/* 控制区面板：标题嵌入面板内部（与行数胶囊一致） */
.controls .ctrl-sel > .sel-label-abs {
  display: none;   /* 改用 sel-info 内部的 .sel-label */
}
.controls .ctrl-sel .sel-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 0 2px;
  min-width: 0;
  overflow: visible;
  position: relative;
}
/* 悬浮小标签片（参考图：胶囊顶部独立小标签） */
/* 标签直接作为胶囊内上方小字（不再是独立浮标签片） */
.controls .ctrl-sel .sel-label {
  position: static;
  transform: none;
  display: block;
  font-size: 10px;
  letter-spacing: 0.3px;
  color: rgba(200,220,240,0.7);
  font-family: 'PingFang SC', 'Chakra Petch', 'Microsoft YaHei', sans-serif;
  font-weight: 600;
  padding: 0;
  background: transparent;
  border: none;
  border-radius: 0;
  box-shadow: none;
  text-shadow: none;
  white-space: nowrap;
  line-height: 1;
  text-transform: none;
  z-index: auto;
}
.controls .ctrl-sel .sel-value {
  display: block;
  font-size: 19px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  text-shadow: 0 1px 2px rgba(0,10,30,0.5);
  white-space: nowrap;
  letter-spacing: 0.02em;
}

/* ─── Respin 槽：槽位上方展示红色足球旋转图标 ─── */
/* z-index:10 让图标能从 .slots 顶部抬升到 .board-wrap(z:1) 之上，避免被 canvas 底边遮挡 */
.slot.is-respin { position: relative; z-index: 10; }

/* 灯条本体隐形，只留占位（维持与普通槽等高对齐） */
.slot.is-respin .slot-bar {
  background: transparent;
  border: none;
  box-shadow: none;
  overflow: visible;
}
.slot.is-respin .slot-bar::after { display: none; }

/* Respin 图标 —— 红色足球 + 旋转光环 */
.slot.is-respin .slot-bar::before {
  content: '';
  position: absolute;
  left: 50%;
  top: -11px;
  transform: translateX(-50%);
  width: 22px;
  height: 22px;
  background-image: url('respin.png');
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  filter:
    drop-shadow(0 0 6px rgba(255,90,90,0.75))
    drop-shadow(0 1px 2px rgba(0,20,40,0.55));
  pointer-events: none;
  z-index: 2;
  animation: jerseyShine 2.6s ease-in-out infinite;
}

/* Respin 图标微微呼吸发光 */
@keyframes jerseyShine {
  0%, 100% {
    filter:
      drop-shadow(0 0 6px rgba(255,90,90,0.65))
      drop-shadow(0 1px 2px rgba(0,20,40,0.55));
  }
  50% {
    filter:
      drop-shadow(0 0 10px rgba(255,120,120,0.95))
      drop-shadow(0 0 16px rgba(255,180,60,0.5))
      drop-shadow(0 1px 2px rgba(0,20,40,0.55));
  }
}

/* 下方倍率数字：金色调与球衣呼应 */
.slot.is-respin .slot-val {
  color: #ffd84a;
  text-shadow:
    -1px 0 rgba(90,45,0,0.95),
    1px 0 rgba(90,45,0,0.95),
    0 -1px rgba(90,45,0,0.95),
    0 1px rgba(90,45,0,0.95),
    0 0 6px rgba(255,200,60,0.55);
}

/* ─── Respin 命中特效：红球旋转 + 把小球吸进去 ─── */

/* 图标本身命中时：自转两圈 + 放大脉冲发光 */
.slot.is-respin.jersey-hit .slot-bar::before {
  animation:
    jerseyShine 2.6s ease-in-out infinite,
    respinSpinHit 1s cubic-bezier(.25,.8,.3,1.05);
}
@keyframes respinSpinHit {
  0% {
    transform: translateX(-50%) rotate(0deg) scale(1);
    filter:
      drop-shadow(0 0 6px rgba(255,90,90,0.75))
      drop-shadow(0 1px 2px rgba(0,20,40,0.55));
  }
  35% {
    transform: translateX(-50%) rotate(420deg) scale(1.35);
    filter:
      drop-shadow(0 0 12px #ff6060)
      drop-shadow(0 0 22px rgba(255,100,60,0.8))
      drop-shadow(0 0 32px rgba(255,160,80,0.55))
      brightness(1.3);
  }
  70% {
    transform: translateX(-50%) rotate(640deg) scale(0.95);
    filter:
      drop-shadow(0 0 10px rgba(255,120,80,0.85))
      drop-shadow(0 1px 2px rgba(0,20,40,0.55));
  }
  100% {
    transform: translateX(-50%) rotate(720deg) scale(1);
    filter:
      drop-shadow(0 0 6px rgba(255,90,90,0.75))
      drop-shadow(0 1px 2px rgba(0,20,40,0.55));
  }
}

/* 被吸上来的小白球：从槽位中心升起并缩入红球中心 */
.respin-suck-ball {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ffffff 0%, #e6eaf0 55%, #8591a3 100%);
  box-shadow:
    0 0 6px rgba(255,255,255,0.85),
    0 0 12px rgba(255,180,140,0.55);
  pointer-events: none;
  z-index: 14;
  transform: translate(-50%, -50%);
  animation: respinSuckBall 0.6s cubic-bezier(.55,0,.7,.2) forwards;
}
@keyframes respinSuckBall {
  0%   {
    transform: translate(-50%, -50%) translate(0, 0) scale(1) rotate(0deg);
    opacity: 1;
  }
  55%  { opacity: 1; }
  100% {
    transform: translate(-50%, -50%) translate(0, -18px) scale(0.15) rotate(300deg);
    opacity: 0;
  }
}

/* 向心粒子：从外围飞入红球中心（吸附感） */
.respin-suck-spark {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 6px; height: 6px;
  background: radial-gradient(circle, #ffe0c0 0%, #ff5050 55%, rgba(200,30,30,0) 85%);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(255,100,80,0.9);
  pointer-events: none;
  z-index: 12;
  transform: translate(-50%, -50%);
  animation: respinSuckSpark 0.7s cubic-bezier(.4,.05,.65,.3) forwards;
}
@keyframes respinSuckSpark {
  0% {
    transform:
      translate(-50%, -50%)
      translate(var(--sx, 0), var(--sy, 0))
      scale(0.55);
    opacity: 0;
  }
  25% { opacity: 1; }
  100% {
    transform:
      translate(-50%, -50%)
      translate(0, -18px)
      scale(0.2);
    opacity: 0;
  }
}

<script>
// ── 足球 Sprite：从 ball1.jpg 圆形裁切生成透明 PNG ──
// 加载完成后其他绘制代码会直接 drawImage 贴图；未加载完时回退到几何绘制
const BALL_SPRITE = {
  img:   null,     // 圆形裁切后的 offscreen canvas
  ready: false,
};
(function prepareBallSprite() {
  const raw = new Image();
  raw.crossOrigin = 'anonymous';
  raw.onload = () => {
    // 原图 728×542，足球大致居中；取方形裁切区域 → 圆形裁切 → 透明
    const iw = raw.naturalWidth;
    const ih = raw.naturalHeight;
    const size = Math.min(iw, ih) - 30;  // 预留 15px 边距规避背景白
    const cx  = iw / 2;
    const cy  = ih / 2 - 10;              // 球在图中微偏上，修正
    const oc = document.createElement('canvas');
    const S  = 256;                        // sprite 输出尺寸
    oc.width = S; oc.height = S;
    const ox = oc.getContext('2d');
    ox.save();
    ox.beginPath();
    ox.arc(S/2, S/2, S/2 - 1, 0, Math.PI * 2);
    ox.clip();
    // 源图映射到 sprite 方格
    ox.drawImage(raw, cx - size/2, cy - size/2, size, size, 0, 0, S, S);
    ox.restore();
    BALL_SPRITE.img = oc;
    BALL_SPRITE.ready = true;
  };
  raw.onerror = () => {
    console.warn('[ball1.jpg] 加载失败，使用回退几何绘制');
  };
  raw.src = 'ball1.jpg';
})();

// ── 当前行数（8-16），X 行对应 X+1 个倍率槽 ──
let selectedRows = 13;
const PAD_SIDE   = 10;
const ROWS_MAX   = 16;                               // 固定参考行数（决定canvas高度）
const D_16       = (390 - 2 * PAD_SIDE) / 17;       // ≈ 21.76px，16行基准钉间距
const ROW_H16    = D_16 * Math.sqrt(3) / 2;         // ≈ 18.84px，16行基准行高
const WALL_SLOPE = 0.19;                             // 缓梯形（参考图：轻微透视，场地几乎铺满画布）
// d(ROWS) = D_16 * ROWS_MAX / ROWS — 行少则间距大，铺满固定三角形
// domeR(d) = 3*d/4 — 壁顶开口始终与外沿钉对齐

// ═══════════════════════════════════════════════════════════════════════════
//  分裂钉布局：基于严密数学推导的预设表
// ═══════════════════════════════════════════════════════════════════════════
//  记号：(r, c) 表示第 r 行（0-indexed）、第 c 列钉子（该行路径可达 col ∈ [1, r+1]）
//
//  数学模型：
//    - Plinko 梯形板，第 r 行有 r+3 个钉、R+1 个底槽
//    - 球每撞钉 50/50 向左/右偏移 d/2
//    - 命中概率  P_hit(r, c) = C(r, c-1) / 2^r
//    - 分裂后子球：左 (r+1, c)、右 (r+1, c+1)，weight = 0.55 × 父
//    - 子球期望倍率：E_child = Σ C(R-r-1, k)/2^(R-r-1) × M[offset+k]
//    - 单球分裂增益：gain(r,c) = P_hit × (E_L + E_R) × 0.05
//                   (推导：0.55×(E_L+E_R) - 0.5×(E_L+E_R) = 0.05×(E_L+E_R))
//    - 分裂分离度：sep = |E_R − E_L|，衡量"左右子球走向不同"的可感知程度
//
//  优化目标：composite = gain × (1 + α × sep/(E_L+E_R))，α=2.5
//  设计约束：左右严格对称、同行最多 2 钉、双层分布（浅+深）、避 sep=0 中心钉
//
//  推导结果（见 /tmp/split_peg_v3.py，mode=刺激，RTP 基准）：
//    R=8   K=2  (4,2)(4,4)              p_hit_sum=50%   sep̄=0.51  gain̄=0.023
//    R=9   K=2  (5,2)(5,5)              p_hit_sum=31%   sep̄=0.74  gain̄=0.018
//    R=10  K=4  (3,2)(3,3)(6,3)(6,5)    p_hit_sum=122%  sep̄=0.32  gain̄=0.026
//    R=11  K=4  (3,2)(3,3)(6,3)(6,5)    p_hit_sum=122%  sep̄=0.32  gain̄=0.026
//    R=12  K=4  (3,2)(3,3)(6,3)(6,5)    p_hit_sum=122%  sep̄=0.31  gain̄=0.026
//    R=13  K=4  (3,2)(3,3)(7,3)(7,6)    p_hit_sum=108%  sep̄=0.43  gain̄=0.025
//    R=14  K=4  (3,2)(3,3)(7,3)(7,6)    p_hit_sum=108%  sep̄=0.36  gain̄=0.018
//    R=15  K=4  (3,2)(3,3)(8,3)(8,7)    p_hit_sum=97%   sep̄=0.33  gain̄=0.013
//    R=16  K=4  (4,2)(4,4)(8,3)(8,7)    p_hit_sum=72%   sep̄=0.44  gain̄=0.010
//  (p_hit_sum > 100% 表示存在链式触发：子球仍可经过深层分裂钉)
// ═══════════════════════════════════════════════════════════════════════════
const SPLIT_PRESETS = {
  8:  [[4,2],[4,4]],
  9:  [[5,2],[5,5]],
  10: [[3,2],[3,3],[6,3],[6,5]],
  11: [[3,2],[3,3],[6,3],[6,5]],
  12: [[3,2],[3,3],[6,3],[6,5]],
  13: [[3,2],[3,3],[7,3],[7,6]],
  14: [[3,2],[3,3],[7,3],[7,6]],
  15: [[3,2],[3,3],[8,3],[8,7]],
  16: [[4,2],[4,4],[8,3],[8,7]],
};

function getSplits() {
  if (!(window.buyFeatures && window.buyFeatures.split)) return [];
  const preset = SPLIT_PRESETS[selectedRows];
  if (!preset) return [];
  return preset.map(([r, c]) => [r, c]);
}

function drawBoard(glows = {}) {
  const canvas = document.getElementById('board');
  const wrap   = canvas.parentElement;

  // 让 board canvas 向上延伸，覆盖 machine-wrap 区域，共用一套瓷砖
  const machineWrap = document.querySelector('.machine-wrap');
  const mwH = machineWrap ? machineWrap.offsetHeight : 0;
  wrap.style.marginTop = (-mwH) + 'px';

  const W      = wrap.offsetWidth;   // canvas 保持全宽，避免背景色露边

  const ROWS       = selectedRows;
  const SLOTS      = selectedRows + 1;
  const padT       = 10 + mwH;
  const padB       = 7;
  // d 随行数缩放：底行外沿始终贴 PAD_SIDE 安全边缘，行少则钉子更大
  const d          = (W - 2 * PAD_SIDE) / (ROWS + 1);
  const rowH       = d * Math.sqrt(3) / 2;
  const H          = padT + ROW_H16 * ROWS_MAX + padB - 14;  // canvas 高度（较原始固定高 -14px，目标 ≈360px）

  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginLeft  = '';
  canvas.style.marginRight = '';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx   = W / 2;
  const pegR = Math.min(rowH, d) * 0.17;

  // 底行钉子中心固定在 canvas 底部上方 20px 处（视觉一致性）
  const pegShift  = (H - padB - 15) - (padT + (ROWS - 0.5) * rowH);
  const pegX = (row, col) => cx - ((row + 2) * d) / 2 + col * d;
  const pegY = (row)      => padT + row * rowH + rowH / 2 + pegShift;

  const splits = getSplits();

  const topY = pegY(0);
  const botY = H - padB;

  // 场地边界：顶部 = 球门口（tube），底部 = 近满画布；梯形缓透视
  const slope     = WALL_SLOPE;
  const domeBaseY = padT + pegShift;

  // ── Canvas base fill：明亮日光天空（参考图蓝色球场主调）──
  ctx.clearRect(0, 0, W, H);

  // 1) 底色：明亮日光天空渐变（中间值，不刺眼也不昏暗）
  const outBg = ctx.createLinearGradient(0, 0, 0, H);
  outBg.addColorStop(0,    '#2f7bc4');  // sky-top
  outBg.addColorStop(0.45, '#1c5596');  // sky-mid
  outBg.addColorStop(1,    '#0e3a72');  // sky-bot
  ctx.fillStyle = outBg;
  ctx.fillRect(0, 0, W, H);

  // 2) 大尺寸柔和色块：明亮蓝调交融
  const blurBlobs = [
    { x: -0.05, y: 0.02, r: 240, c: '130,200,255', a: 0.35 },
    { x:  0.02, y: 0.25, r: 200, c: '70,150,230',  a: 0.32 },
    { x:  0.22, y: 0.05, r: 180, c: '160,215,255', a: 0.28 },
    { x:  1.05, y: 0.02, r: 240, c: '130,200,255', a: 0.35 },
    { x:  0.98, y: 0.25, r: 200, c: '70,150,230',  a: 0.32 },
    { x:  0.78, y: 0.05, r: 180, c: '160,215,255', a: 0.28 },
    { x:  0.50, y: 0.35, r: 220, c: '30,90,170',   a: 0.22 },
  ];
  for (const B of blurBlobs) {
    const bx = B.x * W;
    const by = B.y * H;
    const g  = ctx.createRadialGradient(bx, by, 0, bx, by, B.r);
    g.addColorStop(0,    `rgba(${B.c},${B.a})`);
    g.addColorStop(0.55, `rgba(${B.c},${B.a * 0.5})`);
    g.addColorStop(1,    `rgba(${B.c},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(bx - B.r, by - B.r, B.r * 2, B.r * 2);
  }

  // 3) 顶部中央大聚光灯（日光感）
  const spotTop = ctx.createRadialGradient(W * 0.50, -40, 0, W * 0.50, -40, 260);
  spotTop.addColorStop(0,    'rgba(255,255,255,0.8)');
  spotTop.addColorStop(0.35, 'rgba(220,240,255,0.45)');
  spotTop.addColorStop(0.7,  'rgba(180,215,250,0.15)');
  spotTop.addColorStop(1,    'rgba(140,190,240,0)');
  ctx.fillStyle = spotTop;
  ctx.fillRect(0, 0, W, 220);

  // 4) 左右两侧柔光带
  const spotLeft = ctx.createRadialGradient(-60, H * 0.10, 0, -60, H * 0.10, 260);
  spotLeft.addColorStop(0,    'rgba(220,240,255,0.55)');
  spotLeft.addColorStop(0.5,  'rgba(180,215,250,0.18)');
  spotLeft.addColorStop(1,    'rgba(130,180,230,0)');
  ctx.fillStyle = spotLeft;
  ctx.fillRect(0, 0, 200, 260);

  const spotRight = ctx.createRadialGradient(W + 60, H * 0.10, 0, W + 60, H * 0.10, 260);
  spotRight.addColorStop(0,    'rgba(220,240,255,0.55)');
  spotRight.addColorStop(0.5,  'rgba(180,215,250,0.18)');
  spotRight.addColorStop(1,    'rgba(130,180,230,0)');
  ctx.fillStyle = spotRight;
  ctx.fillRect(W - 200, 0, 200, 260);

  // ── 球场草坪梯形（缓和透视、宽顶口、深浅横条）──────────────────
  const domeBottomY = mwH - 9;
  const tubeL = cx - 130;  // 顶部开口宽（参考图：场地上沿宽度≈底边的70%）
  const tubeR = cx + 130;
  // 场地墙：从 tube 直接向下延伸到底部（梯形两侧略外扩）
  const fieldVertH = botY - domeBottomY;
  const wallBL     = tubeL - fieldVertH * slope;
  const wallBR     = tubeR + fieldVertH * slope;
  const wallTL     = tubeL;  // 兼容后续引用
  const wallTR     = tubeR;

  // 草坪渐变：顶部略深（远）→ 底部略亮（近）
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tubeL, domeBottomY);
  ctx.lineTo(tubeR, domeBottomY);
  ctx.lineTo(wallBR, botY);
  ctx.lineTo(wallBL, botY);
  ctx.closePath();
  ctx.clip();  // 梯形区域裁剪

  // 基底草绿（明亮自然绿）
  const grassGrad = ctx.createLinearGradient(0, domeBottomY, 0, botY);
  grassGrad.addColorStop(0,    '#6bc04d');   // 远处略亮
  grassGrad.addColorStop(0.4,  '#5fb344');   // pitch-light
  grassGrad.addColorStop(0.75, '#4fa138');   // pitch-mid
  grassGrad.addColorStop(1,    '#408a2c');   // pitch-dark
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, domeBottomY - 4, W, botY - domeBottomY + 6);

  // 横向草坪条纹（明暗交替模拟割草机痕迹）
  const fieldH  = botY - domeBottomY;
  const stripeN = 8;
  const stripeH = fieldH / stripeN;
  for (let i = 0; i < stripeN; i++) {
    const yA = domeBottomY + i * stripeH;
    // 浅条加白提亮；深条加绿压暗
    ctx.fillStyle = (i % 2 === 0) ? 'rgba(255,255,230,0.14)' : 'rgba(30,90,30,0.18)';
    ctx.fillRect(0, yA, W, stripeH + 0.5);
  }

  // 细密垂直草丝纹理
  for (let i = 0; i < stripeN; i++) {
    const yA = domeBottomY + i * stripeH;
    const isLight = (i % 2 === 0);
    const grassColor = isLight ? 'rgba(255,255,230,' : 'rgba(30,80,25,';
    const grassAlpha = isLight ? 0.10 : 0.14;
    const grassCount = 70;
    for (let g = 0; g < grassCount; g++) {
      const gx = Math.random() * W;
      const gy = yA + Math.random() * stripeH;
      const gh = 1.2 + Math.random() * 2.5;
      ctx.strokeStyle = grassColor + grassAlpha + ')';
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(gx, gy);
      ctx.lineTo(gx + (Math.random() - 0.5) * 0.6, gy - gh);
      ctx.stroke();
    }
  }

  // 散落的细小亮斑/暗斑
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 140; i++) {
    const nx = Math.random() * W;
    const ny = domeBottomY + Math.random() * fieldH;
    const nr = 0.4 + Math.random() * 0.8;
    const isHi = Math.random() < 0.5;
    ctx.fillStyle = isHi ? 'rgba(255,255,220,0.22)' : 'rgba(30,70,25,0.22)';
    ctx.beginPath(); ctx.arc(nx, ny, nr, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 边缘暗角（左右立体感）
  const edgeGrad = ctx.createLinearGradient(0, 0, W, 0);
  edgeGrad.addColorStop(0,    'rgba(30,70,25,0.28)');
  edgeGrad.addColorStop(0.18, 'rgba(30,70,25,0)');
  edgeGrad.addColorStop(0.82, 'rgba(30,70,25,0)');
  edgeGrad.addColorStop(1,    'rgba(30,70,25,0.28)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, domeBottomY, W, fieldH);
  // 上方日光晕（远处略亮）
  const topGlow = ctx.createLinearGradient(0, domeBottomY, 0, domeBottomY + fieldH * 0.4);
  topGlow.addColorStop(0, 'rgba(255,255,230,0.18)');
  topGlow.addColorStop(1, 'rgba(255,255,230,0)');
  ctx.fillStyle = topGlow;
  ctx.fillRect(0, domeBottomY, W, fieldH * 0.4);

  // ── 禁区白色标线已整体去除（大禁区/小禁区/罚球点/D 弧）──
  ctx.restore();

  // ── canvas 底部与 pitch 之间的 padB 缺口：草绿 → slot 深蓝的柔和过渡 ──
  // slot 顶色为 var(--ui-blue-deep) = #0e2f5c
  const bottomFill = ctx.createLinearGradient(0, botY - 2, 0, H);
  bottomFill.addColorStop(0, 'rgba(94,168,67,0)');    // 融入 pitch 底部，无硬边
  bottomFill.addColorStop(0.5, '#1a3a6a');
  bottomFill.addColorStop(1, '#0e2f5c');              // 与 .slots 顶色对齐
  ctx.fillStyle = bottomFill;
  ctx.fillRect(0, botY - 2, W, H - botY + 2);

  // ── 球场边界白线（梯形外框）──
  ctx.lineCap   = 'round';
  ctx.lineWidth = 2.2;
  ctx.shadowBlur  = 5;
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';

  // 顶线（球门线，水平）
  ctx.beginPath();
  ctx.moveTo(tubeL, domeBottomY);
  ctx.lineTo(tubeR, domeBottomY);
  ctx.stroke();
  // 左墙
  ctx.beginPath();
  ctx.moveTo(tubeL, domeBottomY);
  ctx.lineTo(wallBL, botY);
  ctx.stroke();
  // 右墙
  ctx.beginPath();
  ctx.moveTo(tubeR, domeBottomY);
  ctx.lineTo(wallBR, botY);
  ctx.stroke();
  // 底线不再绘制：pitch 底直接与下方 slot 赛况条用同色衔接，避免"暗条纹—白线—亮绿"的跳变
  ctx.shadowBlur = 0;

  // ── Pegs ─────────────────────────────────────────────────────────────
  for (let row = 0; row < ROWS; row++) {
    const numPegs = row + 3;   // 第一行固定 3 钉，底行 = 槽数+1
    for (let col = 0; col < numPegs; col++) {
      const x       = pegX(row, col);
      const y       = pegY(row);
      const isSplit = splits.some(([sr, sc]) => sr === row && sc === col);

      if (isSplit) {
        const spikes  = 6;
        // 呼吸脉冲：0~1 正弦，每颗钉相位略有偏移增加层次感
        const phase   = (row * 7 + col * 3) * 0.8;
        const pulse   = 0.5 + 0.5 * Math.sin(Date.now() / 700 + phase);
        const outerR  = pegR * (1.9 + pulse * 0.5);   // 9.5~12px 呼吸
        const innerR  = pegR * 0.72;
        const glowR   = outerR + 5 + pulse * 5;

        // Outer breathing glow（金色）
        const ga = ctx.createRadialGradient(x, y, 0, x, y, glowR);
        ga.addColorStop(0,   `rgba(255,210,50,${0.45 + pulse * 0.3})`);
        ga.addColorStop(0.5, `rgba(255,160,20,${0.15 + pulse * 0.1})`);
        ga.addColorStop(1,   'transparent');
        ctx.fillStyle = ga;
        ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI * 2); ctx.fill();

        // Starburst shape（金色渐变）
        ctx.beginPath();
        for (let i = 0; i < spikes * 2; i++) {
          const angle = (i * Math.PI / spikes) - Math.PI / 2;
          const r = i % 2 === 0 ? outerR : innerR;
          const sx = x + Math.cos(angle) * r;
          const sy = y + Math.sin(angle) * r;
          i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        const sg = ctx.createRadialGradient(x - 1, y - 2, 0, x, y, outerR);
        sg.addColorStop(0,   '#fff0a0');
        sg.addColorStop(0.4, '#ffcc20');
        sg.addColorStop(0.8, '#dd8800');
        sg.addColorStop(1,   '#995500');
        ctx.fillStyle = sg;
        ctx.fill();

        // Center circle
        const cg = ctx.createRadialGradient(x - 1, y - 1.5, 0, x, y, innerR);
        cg.addColorStop(0, '#fffde0');
        cg.addColorStop(1, '#ffaa00');
        ctx.fillStyle = cg;
        ctx.beginPath(); ctx.arc(x, y, innerR, 0, Math.PI * 2); ctx.fill();

        // Center shine
        ctx.fillStyle = `rgba(255,255,220,${0.6 + pulse * 0.3})`;
        ctx.beginPath(); ctx.arc(x - 1, y - 1.5, innerR * 0.38, 0, Math.PI * 2); ctx.fill();

      } else {
        // Drop shadow — 深草投影
        const sh = ctx.createRadialGradient(x + 1.2, y + 1.8, 0, x + 1.2, y + 1.8, pegR + 2.2);
        sh.addColorStop(0,   'rgba(25,60,20,0.5)');
        sh.addColorStop(1,   'transparent');
        ctx.fillStyle = sh;
        ctx.beginPath(); ctx.arc(x + 1.2, y + 1.8, pegR + 2.2, 0, Math.PI * 2); ctx.fill();

        // Peg body — 浅绿凸起（peg-body → peg-mid → peg-edge）
        const p = ctx.createRadialGradient(x - pegR * 0.45, y - pegR * 0.55, 0, x, y, pegR);
        p.addColorStop(0,    '#f2f8e4');
        p.addColorStop(0.55, '#c7dfa8');
        p.addColorStop(1,    '#a5c080');
        ctx.fillStyle = p;
        ctx.beginPath(); ctx.arc(x, y, pegR, 0, Math.PI * 2); ctx.fill();

        // 顶面高光
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(x - pegR * 0.35, y - pegR * 0.45, pegR * 0.32, 0, Math.PI * 2); ctx.fill();
      }

      // 碰撞高亮：加法混合让钉子自然变亮，不覆盖原色
      const gAmt = glows[row * 20 + col] || 0;
      if (gAmt > 0) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const gr = ctx.createRadialGradient(x, y, 0, x, y, pegR);
        gr.addColorStop(0,   `rgba(255,240,160,${gAmt * 0.9})`);
        gr.addColorStop(1,   `rgba(120,180,255,0)`);
        ctx.fillStyle = gr;
        ctx.beginPath(); ctx.arc(x, y, pegR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
  }
}

// ── 球门内足球堆物理动画（椭圆形网，足球堆叠在底部轻微抖动）─────────
(function initGoalPhysics() {
  const dc   = document.getElementById('dome-canvas');
  if (!dc) return;
  const dx   = dc.getContext('2d');
  // canvas 物理 166x66，CSS 83x33，scale(2,2) 对齐 → logical = CSS 尺寸
  const W_L  = 83;
  const H_L  = 33;
  const GRAV = 0.10;
  const DAMP = 0.45;
  const FRIC = 0.88;
  const BALL_R = 4.5;  // 球更小，适应小球门

  // 10 颗足球堆满球门
  // hiMult 关闭：10 白球；打开：7 白 + 2 红 + 1 金
  const N = 10;
  const balls = Array.from({length: N}, (_, i) => {
    return {
      x:  12 + Math.random() * (W_L - 24),
      y:  6 + Math.random() * (H_L - 24),
      vx: (Math.random() - 0.5) * 0.8,
      vy: 0,
      r:  BALL_R,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.03,
      color: 'normal',
    };
  });

  function refreshGoalBallColors() {
    const hi = !!(window.buyFeatures && window.buyFeatures.hiMult);
    balls.forEach(b => b.color = 'normal');
    if (hi) {
      // 2 红 + 1 金 + 7 白（总 10 颗）
      if (balls[0]) balls[0].color = 'red';
      if (balls[1]) balls[1].color = 'red';
      if (balls[2]) balls[2].color = 'gold';
      // 打开瞬间：给所有球一次强冲量，立刻形成翻滚态
      for (const b of balls) {
        b.vx += (Math.random() - 0.5) * 3.5;
        b.vy -= Math.random() * 2.2 + 0.8;
        b.vrot += (Math.random() - 0.5) * 0.4;
      }
    }
  }
  refreshGoalBallColors();
  // 供外部 drawDome() 钩子调用
  window.drawDome = refreshGoalBallColors;

  // 绘制单个足球：按截角二十面体正投影精确绘制（与下落足球共用算法）
  function drawMiniFoot(b) {
    dx.save();
    dx.translate(b.x, b.y);
    dx.rotate(b.rot);
    drawSoccerGlyph(dx, 0, 0, b.r);
    // 高倍率色叠加
    if (b.color === 'red' || b.color === 'gold') {
      dx.save();
      dx.globalCompositeOperation = 'multiply';
      dx.fillStyle = b.color === 'red' ? 'rgba(230,60,60,0.85)' : 'rgba(255,200,40,0.9)';
      dx.beginPath(); dx.arc(0, 0, b.r, 0, Math.PI * 2); dx.fill();
      dx.restore();
      // 轻微发光描边
      dx.strokeStyle = b.color === 'red' ? 'rgba(255,130,130,0.8)' : 'rgba(255,235,120,0.9)';
      dx.lineWidth = 0.8;
      dx.beginPath(); dx.arc(0, 0, b.r + 0.3, 0, Math.PI * 2); dx.stroke();
    }
    dx.restore();
  }
  // 与 drawSoccerBall 共用同一贴图（ball1.jpg），未加载时回退几何绘制
  function drawSoccerGlyph(cx2d, x, y, R) {
    cx2d.save();
    cx2d.fillStyle = 'rgba(0,0,0,0.38)';
    cx2d.beginPath(); cx2d.arc(x + 0.5, y + 1.0, R * 0.96, 0, Math.PI * 2); cx2d.fill();
    cx2d.restore();

    if (BALL_SPRITE.ready && BALL_SPRITE.img) {
      cx2d.drawImage(BALL_SPRITE.img, x - R, y - R, R * 2, R * 2);
      return;
    }

    // 黑底
    cx2d.fillStyle = '#141414';
    cx2d.beginPath(); cx2d.arc(x, y, R, 0, Math.PI * 2); cx2d.fill();

    const r1       = R * 0.26;
    const a1       = r1 * Math.cos(Math.PI / 5);
    const s1       = 2 * r1 * Math.sin(Math.PI / 5);
    const r2       = s1;
    const a2       = r2 * Math.cos(Math.PI / 6);
    const hex_dist = a1 + a2;

    const wg = cx2d.createRadialGradient(x - R * 0.3, y - R * 0.35, 0, x, y, R);
    wg.addColorStop(0, '#ffffff'); wg.addColorStop(0.7, '#f3f4f6'); wg.addColorStop(1, '#c8ced4');
    cx2d.fillStyle = wg;
    for (let i = 0; i < 5; i++) {
      const ang = (i * Math.PI * 2) / 5 - Math.PI / 2;
      const hx = x + Math.cos(ang) * hex_dist;
      const hy = y + Math.sin(ang) * hex_dist;
      cx2d.beginPath();
      for (let j = 0; j < 6; j++) {
        const vang = ang + Math.PI + Math.PI / 6 + (j * Math.PI / 3);
        const vx = hx + Math.cos(vang) * r2;
        const vy = hy + Math.sin(vang) * r2;
        j === 0 ? cx2d.moveTo(vx, vy) : cx2d.lineTo(vx, vy);
      }
      cx2d.closePath();
      cx2d.fill();
    }

    const sh = cx2d.createRadialGradient(x - R * 0.4, y - R * 0.45, 0, x - R * 0.4, y - R * 0.45, R * 0.95);
    sh.addColorStop(0, 'rgba(255,255,255,0.45)');
    sh.addColorStop(0.55, 'rgba(255,255,255,0.06)');
    sh.addColorStop(1, 'rgba(255,255,255,0)');
    cx2d.fillStyle = sh;
    cx2d.beginPath(); cx2d.arc(x, y, R - 0.5, 0, Math.PI * 2); cx2d.fill();
  }

  function step() {
    dx.clearRect(0, 0, W_L * 2, H_L * 2);
    dx.save();
    dx.scale(2, 2);

    // hiMult 打开时：随机翻滚态（持续小冲量 + 更低摩擦/阻尼，防止沉底静止）
    const hiActive = !!(window.buyFeatures && window.buyFeatures.hiMult);
    const fric = hiActive ? 0.965 : FRIC;
    const damp = hiActive ? 0.62  : DAMP;

    // 物理：重力+摩擦+底面/侧壁碰撞
    for (const b of balls) {
      b.vy += GRAV;
      b.vx *= fric;
      b.x  += b.vx;
      b.y  += b.vy;
      b.rot += b.vrot;

      // hiMult 打开时：每帧小概率给该球一次随机扰动，营造"煮沸"感
      if (hiActive && Math.random() < 0.04) {
        b.vx += (Math.random() - 0.5) * 2.2;
        b.vy -= Math.random() * 1.8 + 0.4;
        b.vrot += (Math.random() - 0.5) * 0.25;
      }

      // 左右墙
      if (b.x - b.r < 2)       { b.x = 2 + b.r;       b.vx =  Math.abs(b.vx) * damp; }
      if (b.x + b.r > W_L - 2) { b.x = W_L - 2 - b.r; b.vx = -Math.abs(b.vx) * damp; }
      // 底面
      if (b.y + b.r > H_L - 1) { b.y = H_L - 1 - b.r; b.vy = -Math.abs(b.vy) * damp; b.vrot *= 0.9; }
      // 顶部（球门横梁内侧）
      if (b.y - b.r < 2)       { b.y = 2 + b.r;       b.vy =  Math.abs(b.vy) * damp; }
    }
    // 球碰球
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b2 = balls[j];
        const dx2 = a.x - b2.x, dy2 = a.y - b2.y;
        const dist = Math.sqrt(dx2*dx2 + dy2*dy2);
        const minD = a.r + b2.r;
        if (dist < minD && dist > 0) {
          const nx = dx2/dist, ny = dy2/dist;
          const ov = (minD - dist) / 2;
          a.x  += nx*ov;  a.y  += ny*ov;
          b2.x -= nx*ov;  b2.y -= ny*ov;
          const relVx = a.vx - b2.vx, relVy = a.vy - b2.vy;
          const dot = relVx*nx + relVy*ny;
          if (dot < 0) {
            a.vx  -= dot * nx * 0.7;  a.vy  -= dot * ny * 0.7;
            b2.vx += dot * nx * 0.7;  b2.vy += dot * ny * 0.7;
          }
        }
      }
    }

    // 绘制（按 y 排序，后画的在上）
    balls.sort((a, b) => a.y - b.y);
    for (const b of balls) drawMiniFoot(b);

    dx.restore();
    requestAnimationFrame(step);
  }
  step();
})();

// ── 经典黑白足球按钮（六边形 + 五边形拼接，截角二十面体投影） ──
// theme: 'blue' = 开始（中央深蓝文字徽章） / 'red' = 停止（中央红色文字徽章）
function renderBallImage(text, theme = 'blue') {
  const DPR = Math.max(2, window.devicePixelRatio || 1);
  const CSS_SIZE = 110;
  const size = CSS_SIZE * DPR;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const R  = size / 2 * 0.96;           // 球半径（留出描边余地）

  const isStop = theme === 'red';
  // 文字徽章的底色
  const badge = isStop
    ? { bg1: '#ff5252', bg2: '#c21010', edge: '#5a0a0a' }
    : { bg1: '#4aa8f5', bg2: '#1565c0', edge: '#0d3b75' };

  // ── 1) 地面投影（椭圆）──
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, cy + R * 0.96, R * 0.85, R * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── 2) 白色球体主底 + 径向明暗（顶亮底暗球面） ──
  const body = ctx.createRadialGradient(
    cx - R * 0.28, cy - R * 0.35, R * 0.05,
    cx, cy + R * 0.1, R * 1.15
  );
  body.addColorStop(0,    '#ffffff');
  body.addColorStop(0.55, '#f5f7fa');
  body.addColorStop(0.85, '#d8dde5');
  body.addColorStop(1,    '#9aa3b0');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = body;
  ctx.fill();

  // 裁剪到球内绘制拼块
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.clip();

  // ── 3) 黑色五边形拼块（截角二十面体正投影：中心 1 + 周围 5，共 6 个可见） ──
  // 几何参数：中心五边形半径 r1，周围五边形中心距离 hexDist
  const r1      = R * 0.22;                       // 中心五边形外接圆
  const a1      = r1 * Math.cos(Math.PI / 5);     // 五边形 apothem
  const s1      = 2 * r1 * Math.sin(Math.PI / 5); // 边长
  const r2      = s1;                             // 周围六边形外接圆（与五边形共享边）
  const a2      = r2 * Math.cos(Math.PI / 6);     // 六边形 apothem
  const hexDist = (a1 + a2) * 1.9;                // 周围黑五边形中心距离（放大让可视化更像经典足球）
  const r3      = R * 0.20;                       // 周围黑五边形半径（略小于中心）

  // 黑色渐变（球面明暗影响）
  function drawBlackPentagon(px, py, pr, rot) {
    const g = ctx.createRadialGradient(
      px - pr * 0.3, py - pr * 0.35, 0,
      px, py, pr * 1.3
    );
    // 根据球面明暗：上方 pent 更亮（接近 #2a2a2a），下方 pent 更暗（#050505）
    const lightness = 1 - (py - cy + R) / (2 * R);  // 0（顶）→ 1（底）
    const topC = 30 + Math.round(40 * lightness);
    g.addColorStop(0,   `rgb(${40 + Math.round(20 * (1 - lightness))},${40 + Math.round(20 * (1 - lightness))},${40 + Math.round(20 * (1 - lightness))})`);
    g.addColorStop(0.6, `rgb(${20 - Math.round(10 * lightness)},${20 - Math.round(10 * lightness)},${20 - Math.round(10 * lightness)})`);
    g.addColorStop(1,   '#000000');
    ctx.fillStyle = g;
    ctx.beginPath();
    for (let j = 0; j < 5; j++) {
      const a = rot + (j * Math.PI * 2) / 5 - Math.PI / 2;
      const vx = px + Math.cos(a) * pr;
      const vy = py + Math.sin(a) * pr;
      j === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
    }
    ctx.closePath();
    ctx.fill();
    // 细边（让黑色块略有立体感）
    ctx.lineWidth = Math.max(1, R * 0.008);
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.stroke();
  }

  // 中心五边形
  drawBlackPentagon(cx, cy, r1, 0);

  // 外圈 5 个黑五边形（形成经典足球分布）
  for (let i = 0; i < 5; i++) {
    const ang = (i * Math.PI * 2) / 5 - Math.PI / 2;
    const px  = cx + Math.cos(ang) * hexDist;
    const py  = cy + Math.sin(ang) * hexDist;
    // 每个外五边形朝向其径向外，旋转 ang + π（顶点朝外）
    drawBlackPentagon(px, py, r3, ang + Math.PI);
  }

  // ── 4) 五边形之间的细黑缝（模拟拼接线）──
  ctx.strokeStyle = 'rgba(40,40,40,0.65)';
  ctx.lineWidth = Math.max(1, R * 0.012);
  ctx.lineCap = 'round';
  for (let i = 0; i < 5; i++) {
    const ang = (i * Math.PI * 2) / 5 - Math.PI / 2;
    // 从中心五边形的顶点连接到相邻外五边形（简短线段，非全连）
    const innerX = cx + Math.cos(ang) * r1;
    const innerY = cy + Math.sin(ang) * r1;
    const outerX = cx + Math.cos(ang) * (hexDist - r3);
    const outerY = cy + Math.sin(ang) * (hexDist - r3);
    ctx.beginPath();
    ctx.moveTo(innerX, innerY);
    ctx.lineTo(outerX, outerY);
    ctx.stroke();
  }

  // ── 5) 球面顶部柔白高光（让整体有球体立体感）──
  const gloss = ctx.createRadialGradient(
    cx - R * 0.3, cy - R * 0.4, 0,
    cx - R * 0.3, cy - R * 0.4, R * 0.85
  );
  gloss.addColorStop(0,    'rgba(255,255,255,0.55)');
  gloss.addColorStop(0.45, 'rgba(255,255,255,0.15)');
  gloss.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = gloss;
  ctx.fillRect(cx - R, cy - R, R * 2, R * 2);

  // ── 6) 底部柔和暗影（球底沉色）──
  const shade = ctx.createRadialGradient(
    cx, cy + R * 0.7, 0,
    cx, cy + R * 0.7, R * 1.1
  );
  shade.addColorStop(0,    'rgba(0,0,0,0.28)');
  shade.addColorStop(0.6,  'rgba(0,0,0,0.08)');
  shade.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = shade;
  ctx.fillRect(cx - R, cy, R * 2, R);

  ctx.restore();  // 解除球内裁剪

  // ── 7) 外圈浅灰描边（轮廓）──
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(60,70,85,0.55)';
  ctx.lineWidth = Math.max(1.2, R * 0.01);
  ctx.stroke();

  // ── 8) 中央文字徽章：深蓝（或红）圆形胶囊，大号白字 ──
  const badgeR = R * 0.42;
  // 徽章底色
  const bg = ctx.createRadialGradient(
    cx - badgeR * 0.2, cy - badgeR * 0.3, 0,
    cx, cy, badgeR
  );
  bg.addColorStop(0, badge.bg1);
  bg.addColorStop(1, badge.bg2);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(cx, cy, badgeR, 0, Math.PI * 2);
  ctx.fill();
  // 徽章描边
  ctx.strokeStyle = badge.edge;
  ctx.lineWidth = Math.max(1.5, R * 0.018);
  ctx.stroke();
  // 徽章顶部高光
  const bGloss = ctx.createLinearGradient(cx, cy - badgeR, cx, cy);
  bGloss.addColorStop(0, 'rgba(255,255,255,0.5)');
  bGloss.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = bGloss;
  ctx.beginPath();
  ctx.arc(cx, cy, badgeR - 1, 0, Math.PI * 2);
  ctx.fill();

  // ── 9) 文字：白色粗体居中 ──
  ctx.fillStyle = '#ffffff';
  ctx.font = `900 ${Math.round(size * 0.17)}px "PingFang SC", "Microsoft YaHei", "Chakra Petch", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = badge.edge;
  ctx.shadowBlur = 2;
  ctx.shadowOffsetY = 1.5;
  ctx.fillText(text, cx, cy + size * 0.005);
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  return canvas.toDataURL('image/png');
}

// 根据行数生成基础倍率配置（对称展开）
function buildBaseConfigs(rows) {
  return SLOT_REF[rows].map(ref => {
    const slots = rows + 1;
    const half  = Math.floor(slots / 2);
    return slots % 2 === 1
      ? [...ref.slice(0, half), ref[half], ...ref.slice(0, half).reverse()]
      : [...ref.slice(0, half), ...ref.slice(0, half).reverse()];
  });
}


let slotConfigs = [];  // 由 onRowsChanged() 动态填充

// 倍率 → 颜色 class 映射
function valToClass(v) {
  if (v >= 100)  return 's-mega';
  if (v >= 25)   return 's-jackpot';
  if (v >= 3)    return 's-high';
  if (v >= 1.5)  return 's-orange';
  if (v >= 1.2)  return 's-yellow';
  if (v >= 1.05) return 's-warm';
  if (v >= 0.8)  return 's-neutral';
  return 's-low';
}

let slotEls = [];
let respinSlots = new Set();   // 当前标记为「球衣槽」的 slot 索引

// 按行数固定的球衣槽位（1-based，与用户规格对齐）
const RESPIN_PRESETS = {
  8:  [3, 7],
  9:  [2, 3, 8, 9],
  10: [4, 8],
  11: [3, 4, 9, 10],
  12: [5, 9],
  13: [4, 5, 10, 11],
  14: [3, 4, 5, 11, 12, 13],
  15: [4, 6, 11, 13],
  16: [7, 11],
};

// 按当前行数填充球衣槽（无随机：同一行数永远同一组位置）
function rollRespinSlots() {
  respinSlots = new Set();
  if (!(window.buyFeatures && window.buyFeatures.respin)) return;
  const preset = RESPIN_PRESETS[selectedRows];
  if (!preset) return;
  // 规格为 1-based，存储为 0-based slot 索引
  preset.forEach(pos1 => respinSlots.add(pos1 - 1));
}

// 根据槽宽计算倍率文字字号（窄行数时自动缩小，避免溢出）
function calcSlotFsize(slotW) {
  // 倍率文字占据槽宽，最长 "0.3×"/"130×" 约 4 字符
  return {
    fsize: Math.max(8, Math.min(12, Math.floor(slotW / 2.6))) + 'px',
  };
}

function slotDisp(val) {
  return val >= 1000 ? (Math.round(val / 100) / 10 + 'K')
       : val >= 10   ? Math.round(val)
       : +val.toFixed(1);
}

function rebuildSlotDom() {
  const container = document.querySelector('.slots');
  const slots  = selectedRows + 1;
  const cfg    = slotConfigs[modeIdx] || [];
  const slotW  = (container.offsetWidth - 2 * PAD_SIDE) / slots;
  container.style.padding = `8px ${PAD_SIDE}px 10px`;
  const { fsize } = calcSlotFsize(slotW);

  rollRespinSlots();

  container.innerHTML = '';
  for (let i = 0; i < slots; i++) {
    const div = document.createElement('div');
    const val = cfg[i];
    const respin = respinSlots.has(i) ? ' is-respin' : '';
    div.className = 'slot ' + valToClass(val) + respin;
    div.innerHTML = `<div class="slot-bar"></div><div class="slot-val" style="font-size:${fsize}">${slotDisp(val)}×</div>`;
    container.appendChild(div);
  }
  slotEls = Array.from(container.querySelectorAll('.slot'));
}

function updateSlots(idx) {
  const cfg    = slotConfigs[idx] || [];
  const container = document.querySelector('.slots');
  const slotW  = (container.offsetWidth - 2 * PAD_SIDE) / (selectedRows + 1);
  const { fsize } = calcSlotFsize(slotW);

  slotEls.forEach((slot, i) => {
    const val = cfg[i];
    const respin = respinSlots.has(i) ? ' is-respin' : '';
    slot.className = 'slot ' + valToClass(val) + respin;
    slot.innerHTML = `<div class="slot-bar"></div><div class="slot-val" style="font-size:${fsize}">${slotDisp(val)}×</div>`;
  });
}
