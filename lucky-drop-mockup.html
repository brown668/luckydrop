<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCKY DROP — UI Mockup v2</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 50% 30%, #12406a 0%, #051528 70%, #020814 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 48px;
  font-family: 'Chakra Petch', sans-serif;
}

.page-label {
  color: rgba(120,200,255,0.4);
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

/* ─── Device ─── */
.device {
  width: 390px;
  height: 844px;              /* iPhone 14 逻辑高度，固定不变 */
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, #0a3a78 0%, #0d5090 40%, #1566a8 70%, #196fb0 100%);
  border-radius: 44px;
  border: 6px solid #062148;
  overflow: hidden;
  position: relative;         /* 底部抽屉 / backdrop / toast 基于此定位 */
  box-shadow:
    0 0 0 1px rgba(60,140,255,0.25),
    0 32px 120px rgba(10,40,90,0.45),
    0 0 60px rgba(20,80,160,0.25);
}

/* Status bar */
.status {
  height: 34px;
  background: rgba(4,20,48,0.75);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  font-size: 11px;
  color: rgba(200,225,255,0.55);
  font-family: 'Space Mono', monospace;
}



/* ─── Header ─── */
.header {
  height: 54px;
  background: linear-gradient(180deg, rgba(4,18,40,0.92), rgba(6,28,58,0.88));
  border-bottom: 1px solid rgba(80,150,220,0.22);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px 0 18px;      /* 右侧 padding 减小，让齿轮更贴边 */
}
.hdr-icons { display: flex; align-items: center; gap: 22px; }   /* 加大余额与齿轮的间距 */
.hdr-icon {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  opacity: 0.88;
  transition: opacity .18s, transform .18s;
}
.hdr-icon:hover { opacity: 1; transform: scale(1.08); }
.hdr-icon svg { width: 22px; height: 22px; fill: #fff; }
.logo-wrap { display: flex; flex-direction: column; gap: 2px; }
.sub-chest { width: 16px; height: 19px; vertical-align: middle; margin: 0 3px 2px; filter: drop-shadow(0 0 4px rgba(255,200,60,0.9)); }
.logo-sub {
  font-size: 11px;
  letter-spacing: 0.5px;
  color: rgba(190,220,255,0.85);
  font-weight: 600;
  line-height: 1;
}
.logo-sub em {
  font-style: normal;
  color: #ffd84a;
  font-weight: 700;
  text-shadow: 0 0 10px rgba(255,220,60,0.9), 0 0 20px rgba(255,180,0,0.5);
}
.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: #ffffff;
  text-shadow: 0 0 12px rgba(120,200,255,0.55), 0 2px 2px rgba(0,0,0,0.45);
  white-space: nowrap;
}
.logo .logo-golden {
  color: #ffd84a;
  text-shadow: 0 0 10px rgba(255,200,50,0.75), 0 2px 2px rgba(0,0,0,0.45);
}
/* ─── 底部余额条 ─── */
.footer-balance {
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(6,28,58,0.92), rgba(4,18,40,0.96));
  border-top: 1px solid rgba(80,150,220,0.28);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 16px 12px;
  position: relative;
  z-index: 5;
}
.balance-wrap {
  display: inline-flex;
  align-items: baseline;
  gap: 10px;
  position: relative;
}
.bal-label {
  font-size: 11px;
  letter-spacing: 3px;
  color: #6ea0cc;
  font-weight: 600;
  text-transform: uppercase;
}
.bal-value {
  font-family: 'Space Mono', monospace;
  font-size: 19px;
  font-weight: 700;
  color: #ffd84a;
  text-shadow: 0 0 10px rgba(255,200,50,0.75), 0 0 22px rgba(255,180,0,0.35);
  letter-spacing: 0.5px;
}
@keyframes balFloat {
  0%   { opacity: 1; transform: translateY(0)    scale(1); }
  15%  { opacity: 1; transform: translateY(-4px)  scale(1.1); }
  100% { opacity: 0; transform: translateY(-28px) scale(0.9); }
}
.bal-float {
  position: absolute;
  right: 0;
  top: -4px;
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: #ffe855;
  white-space: nowrap;
  pointer-events: none;
  animation: balFloat 2s ease-out forwards;
  text-shadow: 0 0 8px rgba(255,220,50,0.95), 0 0 20px rgba(255,180,0,0.6), 0 1px 3px rgba(0,0,0,0.8);
  z-index: 30;
}

/* ─── History Bar ─── */
.history-bar {
  display: flex;
  align-items: center;
  background: rgba(4,18,40,0.9);
  border-bottom: 1px solid rgba(80,150,220,0.2);
  padding: 5px 8px;
  gap: 5px;
  overflow: hidden;
}
.hist-list {
  display: flex;
  gap: 5px;
  flex: 1;
  overflow-x: auto;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.hist-list::-webkit-scrollbar { display: none; }
.hist-badge {
  flex-shrink: 0;
  height: 26px;
  padding: 0 8px;
  border-radius: 7px;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #2b82cf, #0e4a8a);
  color: #fff;
  border: 1px solid rgba(120,200,255,0.45);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3), inset 0 1px 0 rgba(200,235,255,0.25);
}
.hist-badge.h-low {
  background: linear-gradient(180deg, #1a5a96, #0a3666);
  border-color: rgba(80,150,210,0.35);
  color: rgba(220,235,255,0.85);
}
.hist-badge.h-mid {
  background: linear-gradient(180deg, #2b82cf, #105ba0);
}
.hist-badge.h-high {
  background: linear-gradient(180deg, #2b82cf, #105ba0);
  border-color: rgba(255,160,80,0.65);
  box-shadow: 0 1px 6px rgba(255,130,40,0.4), inset 0 1px 0 rgba(210,235,255,0.25);
}
.hist-badge.h-jackpot {
  background: linear-gradient(180deg, #2e8ddc, #1260a8);
  border-color: rgba(255,110,130,0.7);
  box-shadow: 0 1px 8px rgba(255,80,100,0.45), inset 0 1px 0 rgba(210,235,255,0.3);
}
.hist-badge.h-mega {
  background: linear-gradient(180deg, #3598e8, #155fae);
  border-color: rgba(255,220,90,0.85);
  color: #fffbe0;
  box-shadow: 0 1px 10px rgba(255,210,80,0.55), inset 0 1px 0 rgba(220,240,255,0.35);
}

/* ─── 球门发球区 ─── */
.machine-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: transparent;
  padding: 6px 0 0;
  margin-bottom: 0;
  position: relative;
  z-index: 4;
  width: 100%;
  pointer-events: none;  /* 视觉层，不拦截下层点击事件 */
}

/* 球门区：使用 goal.png 作为完整 3D 透视球门贴图（含前框/后框/连接杆/顶侧后网） */
.dome-shell {
  width: 108px;    /* 球门宽（基准，稍放大）*/
  height: 45px;    /* 球门高 ≈ 108 / 2.4 */
  border-radius: 0;
  position: relative;
  overflow: visible;
  background: url('goal.png') center/100% 100% no-repeat;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
}
.dome-shell::before { content: none; }
.dome-shell canvas {
  display: block;
  /* 对齐 PNG 前框内部区域：PNG 前框内 L=90/1200=7.5%, R=1110/1200=92.5%, T=70/500=14%, B=450/500=90% */
  position: absolute;
  left: 7.5%;
  top: 14%;
  width: 85%;
  height: 76%;
  z-index: 3;
}
.dome-shell::after { content: none; }

/* 球门横梁下接的草坪过渡 */
.dome-base {
  width: 100%;
  height: 4px;
  background: transparent;
  margin-top: 0;
}
.dome-crossbar { display: none; }



/* ─── 飘字动画 ─── */
@keyframes floatUp {
  0%   { opacity: 1;   transform: translateY(0)    scale(1); }
  20%  { opacity: 1;   transform: translateY(-12px) scale(1.1); }
  100% { opacity: 0;   transform: translateY(-64px) scale(0.85); }
}
.float-win {
  position: relative;
  pointer-events: none;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  z-index: 20;
  animation: floatUp 1.4s ease-out forwards;
  text-shadow:
    0 0 8px rgba(255,220,50,0.9),
    0 0 16px rgba(255,160,0,0.6),
    0 2px 4px rgba(0,0,0,0.8);
}
.float-win.jackpot {
  font-size: 18px;
  color: #ffe855;
  text-shadow:
    0 0 10px rgba(255,220,50,1),
    0 0 22px rgba(255,180,0,0.8),
    0 2px 4px rgba(0,0,0,0.9);
}
.float-win.mega {
  font-size: 22px;
  color: #f0a0ff;
  text-shadow:
    0 0 12px rgba(220,80,255,1),
    0 0 28px rgba(180,40,255,0.9),
    0 2px 4px rgba(0,0,0,0.9);
}

/* ─── Peg Board ─── */
.row-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  background: #8030c0;
  color: #fff;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 8px;
  z-index: 10;
  letter-spacing: 2px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  pointer-events: none;
}
.board-wrap {
  position: relative;
  z-index: 1;
  overflow: visible;
  background: linear-gradient(180deg, #0a4a8c 0%, #1b6ca8 35%, #2a8c4a 65%, #1e6e36 100%);
}
.board-canvas {
  display: block;
  width: 100%;
}

/* ─── Bottom Slots ─── */
.slots {
  display: flex;
  background: linear-gradient(180deg, #0c2a48 0%, #071e3a 100%);
  padding: 6px 2px 4px;
  gap: 3px;
  margin-top: 0;
  position: relative;
}
/* 底部槽位顶端的蓝色发光条（参考图的亮蓝边） */
.slots::before {
  content: '';
  position: absolute;
  top: 0; left: 10px; right: 10px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #4ac4ff 15%, #7edcff 50%, #4ac4ff 85%, transparent);
  box-shadow: 0 0 10px rgba(80,200,255,0.75);
}
.slot {
  flex: 1;
  height: 30px;
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 12px;
  font-weight: 700;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.12s;
}
/* 槽位顶部的亮蓝色反光条（类似玻璃折射光） */
.slot::before {
  content: '';
  position: absolute;
  top: 2px; left: 3px; right: 3px;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, rgba(120,210,255,0.15), rgba(160,230,255,0.6) 50%, rgba(120,210,255,0.15));
  box-shadow: 0 0 4px rgba(100,200,255,0.7);
}
.slot-x  { font-size: 8px; color: rgba(255,255,255,0.9); line-height: 1; margin-top: -1px; }

/* 球场主题：所有槽位统一蓝色玻璃底，仅通过亮度和边框色区分倍率档次 */

/* ≥100× — 最亮蓝+金边，顶级大奖，脉冲 */
.s-mega {
  background: linear-gradient(180deg, #2a7dcf 0%, #1a5aa0 50%, #0d4284 100%);
  border: 1px solid rgba(255,215,80,0.85);
  color: #fff;
  box-shadow: 0 0 14px rgba(255,200,60,0.6), inset 0 1px 0 rgba(180,230,255,0.45);
  animation: pulseMega 1.5s ease-in-out infinite;
}
@keyframes pulseMega {
  0%,100% { box-shadow: 0 0 12px rgba(255,200,60,0.5), inset 0 1px 0 rgba(180,230,255,0.45); }
  50%      { box-shadow: 0 0 26px rgba(255,210,80,0.95), 0 0 40px rgba(255,180,40,0.5), inset 0 1px 0 rgba(200,240,255,0.55); }
}

/* 25× — 亮蓝+红边，脉冲 */
.s-jackpot {
  background: linear-gradient(180deg, #2878c5 0%, #1a5896 50%, #0c4080 100%);
  border: 1px solid rgba(255,120,130,0.75);
  color: #fff;
  box-shadow: 0 0 12px rgba(255,90,100,0.5), inset 0 1px 0 rgba(170,220,255,0.4);
  animation: pulseRed 2s ease-in-out infinite;
}
@keyframes pulseRed {
  0%,100% { box-shadow: 0 0 10px rgba(255,90,100,0.4); }
  50%      { box-shadow: 0 0 22px rgba(255,100,110,0.85); }
}

/* 3× — 蓝+橙边 */
.s-high {
  background: linear-gradient(180deg, #2674c0 0%, #175492 50%, #0b3e7e 100%);
  border: 1px solid rgba(255,160,80,0.6);
  color: #fff;
  box-shadow: 0 0 8px rgba(255,130,40,0.35), inset 0 1px 0 rgba(170,220,255,0.35);
}

/* 1.6× — 蓝+亮黄边 */
.s-orange {
  background: linear-gradient(180deg, #2370bd 0%, #155290 50%, #0a3c7a 100%);
  border: 1px solid rgba(255,210,110,0.55);
  color: #fff;
  box-shadow: inset 0 1px 0 rgba(160,215,255,0.3);
}

/* 1.2× — 中蓝 */
.s-yellow {
  background: linear-gradient(180deg, #216cb8 0%, #13508a 50%, #093a77 100%);
  border: 1px solid rgba(140,210,255,0.5);
  color: #fff;
  box-shadow: inset 0 1px 0 rgba(160,215,255,0.28);
}

/* 1.1× — 偏深蓝 */
.s-warm {
  background: linear-gradient(180deg, #1e68b4 0%, #114c85 50%, #083671 100%);
  border: 1px solid rgba(120,200,250,0.45);
  color: #fff;
  box-shadow: inset 0 1px 0 rgba(150,210,255,0.25);
}

/* 1× — 深蓝 */
.s-neutral {
  background: linear-gradient(180deg, #1c64af 0%, #10487f 50%, #07326b 100%);
  border: 1px solid rgba(100,185,240,0.4);
  color: #eaf4ff;
  box-shadow: inset 0 1px 0 rgba(140,205,255,0.22);
}

/* 0.4× — 最深蓝 */
.s-low {
  background: linear-gradient(180deg, #175ea6 0%, #0d4178 50%, #052b60 100%);
  border: 1px solid rgba(90,170,225,0.4);
  color: #dcebff;
  box-shadow: inset 0 1px 0 rgba(130,195,250,0.2);
}


/* ─── Controls ─── */
.controls {
  flex: 1;                    /* 吸收 canvas 高度变化，保持 device 总高 844px */
  background: linear-gradient(180deg, #1e7e36 0%, #165a26 55%, #0e3f1c 100%);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  grid-template-rows: 1fr 1fr;
  column-gap: 10px;
  row-gap: 8px;
  padding: 14px 14px 18px;
  border-top: 2px solid rgba(255,255,255,0.12);
  align-items: stretch;
  position: relative;
}
/* 草坪横纹装饰 */
.controls::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(180deg,
      rgba(255,255,255,0.03) 0,
      rgba(255,255,255,0.03) 14px,
      transparent 14px,
      transparent 28px);
  pointer-events: none;
}

/* 通用蓝色圆角面板（控制区 & 右侧浮动） */
.ctrl-sel {
  display: flex;
  align-items: center;
  background: linear-gradient(180deg, #2b82cf 0%, #1961a8 50%, #0e4a8a 100%);
  border-radius: 14px;
  padding: 0 4px;
  height: 54px;
  gap: 3px;
  border: 2px solid #083367;
  box-shadow:
    inset 0 1px 0 rgba(180,230,255,0.45),
    inset 0 -1px 0 rgba(0,0,0,0.25),
    0 2px 6px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
}
.ctrl-sel::before {
  content: '';
  position: absolute;
  top: 2px; left: 6px; right: 6px;
  height: 30%;
  background: linear-gradient(180deg, rgba(255,255,255,0.28), transparent);
  border-radius: 10px 10px 20px 20px;
  pointer-events: none;
}

/* grid 布局定位 */
.ctrl-buy    { grid-column: 1; grid-row: 1; }
.ctrl-bet    { grid-column: 3; grid-row: 1; }
.ctrl-balls  { grid-column: 1; grid-row: 2; }
.ctrl-auto   { grid-column: 3; grid-row: 2; }

.sel-arrow {
  width: 34px; height: 40px;
  background: linear-gradient(180deg, #3d98e8 0%, #1c70c0 45%, #0e4e96 100%);
  border: 1.5px solid #062c5c;
  border-radius: 10px;
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Chakra Petch', sans-serif;
  box-shadow: inset 0 1px 0 rgba(220,240,255,0.55), inset 0 -1px 0 rgba(0,0,0,0.2);
  position: relative;
  z-index: 1;
}
.sel-arrow:hover  { filter: brightness(1.08); }
.sel-arrow:disabled {
  background: linear-gradient(180deg, #4a6a8a, #2e4462);
  opacity: 0.45;
  cursor: not-allowed;
}
.sel-info {
  flex: 1;
  text-align: center;
  line-height: 1.05;
  position: relative;
  z-index: 1;
}
.sel-label {
  display: block;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  margin-bottom: 3px;
  text-transform: uppercase;
  white-space: nowrap;
}
.sel-value {
  display: block;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  font-family: 'Chakra Petch', sans-serif;
  line-height: 1;
  text-shadow: 0 1px 2px rgba(0,0,0,0.45);
}
.sel-value-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 6px;
}
.sel-icon-group {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 18px;
}
.sel-icon-group span {
  opacity: 0.35;
  transition: all .18s;
  filter: grayscale(1);
}
.sel-icon-group span.active {
  opacity: 1;
  filter: none;
  text-shadow: 0 0 8px rgba(255,120,40,0.9);
}

/* 开始按钮：参考图大足球 PLAY */
.start-btn {
  grid-column: 2;
  grid-row: 1 / 3;
  width: 112px;
  align-self: center;
  justify-self: center;
  height: 112px;
  background: radial-gradient(circle at 35% 30%, #ffffff 0%, #f2f2f2 55%, #bfbfbf 100%);
  border: 3px solid #1a4a8c;
  border-radius: 50%;
  color: #0a3a78;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 3px;
  cursor: pointer;
  box-shadow:
    0 6px 18px rgba(0,0,0,0.55),
    0 0 0 3px rgba(255,255,255,0.15),
    inset 0 3px 6px rgba(255,255,255,0.7),
    inset 0 -4px 8px rgba(0,0,0,0.18);
  position: relative;
  overflow: hidden;
  z-index: 2;
  text-shadow: 0 2px 3px rgba(0,0,0,0.12);
}
/* 足球黑色五边形装饰（分散在四周） */
.start-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 50%, transparent 34%, rgba(0,0,0,0.08) 64%, transparent 66%),
    radial-gradient(circle at 18% 22%, #222 7px, transparent 8px),
    radial-gradient(circle at 82% 22%, #222 7px, transparent 8px),
    radial-gradient(circle at 18% 78%, #222 7px, transparent 8px),
    radial-gradient(circle at 82% 78%, #222 7px, transparent 8px);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.82;
}
.start-btn:hover  { filter: brightness(1.06); }
.start-btn:active { transform: scale(0.97); }
.start-btn span {
  /* PLAY 文字容器：居中显示在足球中心 */
  position: relative;
  z-index: 1;
  display: block;
  text-align: center;

<script>
// ── 足球 Sprite：从 ball1.jpg 圆形裁切生成透明 PNG ──
// 加载完成后其他绘制代码会直接 drawImage 贴图；未加载完时回退到几何绘制
const BALL_SPRITE = {
  img:   null,     // 圆形裁切后的 offscreen canvas
  ready: false,
};
(function prepareBallSprite() {
  const raw = new Image();
  raw.crossOrigin = 'anonymous';
  raw.onload = () => {
    // 原图 728×542，足球大致居中；取方形裁切区域 → 圆形裁切 → 透明
    const iw = raw.naturalWidth;
    const ih = raw.naturalHeight;
    const size = Math.min(iw, ih) - 30;  // 预留 15px 边距规避背景白
    const cx  = iw / 2;
    const cy  = ih / 2 - 10;              // 球在图中微偏上，修正
    const oc = document.createElement('canvas');
    const S  = 256;                        // sprite 输出尺寸
    oc.width = S; oc.height = S;
    const ox = oc.getContext('2d');
    ox.save();
    ox.beginPath();
    ox.arc(S/2, S/2, S/2 - 1, 0, Math.PI * 2);
    ox.clip();
    // 源图映射到 sprite 方格
    ox.drawImage(raw, cx - size/2, cy - size/2, size, size, 0, 0, S, S);
    ox.restore();
    BALL_SPRITE.img = oc;
    BALL_SPRITE.ready = true;
  };
  raw.onerror = () => {
    console.warn('[ball1.jpg] 加载失败，使用回退几何绘制');
  };
  raw.src = 'ball1.jpg';
})();

// ── 当前行数（8-16），X 行对应 X+1 个倍率槽 ──
let selectedRows = 13;
const PAD_SIDE   = 10;
const ROWS_MAX   = 16;                               // 固定参考行数（决定canvas高度）
const D_16       = (390 - 2 * PAD_SIDE) / 17;       // ≈ 21.76px，16行基准钉间距
const ROW_H16    = D_16 * Math.sqrt(3) / 2;         // ≈ 18.84px，16行基准行高
const WALL_SLOPE = 0.19;                             // 缓梯形（参考图：轻微透视，场地几乎铺满画布）
// d(ROWS) = D_16 * ROWS_MAX / ROWS — 行少则间距大，铺满固定三角形
// domeR(d) = 3*d/4 — 壁顶开口始终与外沿钉对齐

// 分裂钉：仅 13 行时启用
function getSplits() {
  return selectedRows === 13 ? [[2,2],[6,2],[6,6]] : [];
}

function drawBoard(glows = {}) {
  const canvas = document.getElementById('board');
  const wrap   = canvas.parentElement;

  // 让 board canvas 向上延伸，覆盖 machine-wrap 区域，共用一套瓷砖
  const machineWrap = document.querySelector('.machine-wrap');
  const mwH = machineWrap ? machineWrap.offsetHeight : 0;
  wrap.style.marginTop = (-mwH) + 'px';

  const W      = wrap.offsetWidth;   // canvas 保持全宽，避免背景色露边

  const ROWS       = selectedRows;
  const SLOTS      = selectedRows + 1;
  const padT       = 10 + mwH;
  const padB       = 7;
  // d 随行数缩放：底行外沿始终贴 PAD_SIDE 安全边缘，行少则钉子更大
  const d          = (W - 2 * PAD_SIDE) / (ROWS + 1);
  const rowH       = d * Math.sqrt(3) / 2;
  const H          = padT + ROW_H16 * ROWS_MAX + padB - 14;  // canvas 高度（较原始固定高 -14px，目标 ≈360px）

  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginLeft  = '';
  canvas.style.marginRight = '';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx   = W / 2;
  const pegR = Math.min(rowH, d) * 0.17;

  // 底行钉子中心固定在 canvas 底部上方 20px 处（视觉一致性）
  const pegShift  = (H - padB - 15) - (padT + (ROWS - 0.5) * rowH);
  const pegX = (row, col) => cx - ((row + 2) * d) / 2 + col * d;
  const pegY = (row)      => padT + row * rowH + rowH / 2 + pegShift;

  const splits = getSplits();

  const topY = pegY(0);
  const botY = H - padB;

  // 场地边界：顶部 = 球门口（tube），底部 = 近满画布；梯形缓透视
  const slope     = WALL_SLOPE;
  const domeBaseY = padT + pegShift;

  // ── Canvas base fill：球场外侧（虚焦看台夜景，整片柔和蓝色朦胧）──
  ctx.clearRect(0, 0, W, H);

  // 1) 底色：较饱和的蓝色主调（参考图整体蓝色基调）
  const outBg = ctx.createLinearGradient(0, 0, 0, H);
  outBg.addColorStop(0,    '#1e68bd');
  outBg.addColorStop(0.35, '#1557a5');
  outBg.addColorStop(1,    '#0a3a7a');
  ctx.fillStyle = outBg;
  ctx.fillRect(0, 0, W, H);

  // 2) 超大尺寸柔和色块：低对比度蓝调互相交融，形成"高斯模糊"朦胧感
  //    半径 180–260px（远大于外场区域），透明度低，几乎看不见边缘
  const blurBlobs = [
    // 左侧朦胧（整块区域的蓝色微调）
    { x: -0.05, y: 0.02, r: 240, c: '90,170,240',  a: 0.32 },
    { x:  0.02, y: 0.25, r: 200, c: '30,100,180',  a: 0.35 },
    { x:  0.22, y: 0.05, r: 180, c: '110,180,250', a: 0.22 },
    // 右侧朦胧
    { x:  1.05, y: 0.02, r: 240, c: '90,170,240',  a: 0.32 },
    { x:  0.98, y: 0.25, r: 200, c: '30,100,180',  a: 0.35 },
    { x:  0.78, y: 0.05, r: 180, c: '110,180,250', a: 0.22 },
    // 中下较深（把中部往下压暗，让上方更突出）
    { x:  0.50, y: 0.35, r: 220, c: '10,45,100',   a: 0.30 },
  ];
  for (const B of blurBlobs) {
    const bx = B.x * W;
    const by = B.y * H;
    const g  = ctx.createRadialGradient(bx, by, 0, bx, by, B.r);
    g.addColorStop(0,    `rgba(${B.c},${B.a})`);
    g.addColorStop(0.55, `rgba(${B.c},${B.a * 0.5})`);
    g.addColorStop(1,    `rgba(${B.c},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(bx - B.r, by - B.r, B.r * 2, B.r * 2);
  }

  // 3) 顶部中央"大聚光灯光斑"（参考图顶部那片最亮的柔白区域）
  //    超大半径 + 超柔过渡，完全看不到圆形边界
  const spotTop = ctx.createRadialGradient(W * 0.50, -40, 0, W * 0.50, -40, 260);
  spotTop.addColorStop(0,    'rgba(245,250,255,0.65)');
  spotTop.addColorStop(0.35, 'rgba(210,230,255,0.30)');
  spotTop.addColorStop(0.7,  'rgba(170,205,245,0.10)');
  spotTop.addColorStop(1,    'rgba(130,180,235,0)');
  ctx.fillStyle = spotTop;
  ctx.fillRect(0, 0, W, 220);

  // 4) 左右两侧柔光带（参考图两侧偏暗中带微亮的过渡）
  //    锚点在 canvas 外部，让光从外向内扩散，完全无圆形感
  const spotLeft = ctx.createRadialGradient(-60, H * 0.10, 0, -60, H * 0.10, 260);
  spotLeft.addColorStop(0,    'rgba(200,225,255,0.40)');
  spotLeft.addColorStop(0.5,  'rgba(160,200,245,0.12)');
  spotLeft.addColorStop(1,    'rgba(100,160,225,0)');
  ctx.fillStyle = spotLeft;
  ctx.fillRect(0, 0, 200, 260);

  const spotRight = ctx.createRadialGradient(W + 60, H * 0.10, 0, W + 60, H * 0.10, 260);
  spotRight.addColorStop(0,    'rgba(200,225,255,0.40)');
  spotRight.addColorStop(0.5,  'rgba(160,200,245,0.12)');
  spotRight.addColorStop(1,    'rgba(100,160,225,0)');
  ctx.fillStyle = spotRight;
  ctx.fillRect(W - 200, 0, 200, 260);

  // ── 球场草坪梯形（缓和透视、宽顶口、深浅横条）──────────────────
  const domeBottomY = mwH - 9;
  const tubeL = cx - 130;  // 顶部开口宽（参考图：场地上沿宽度≈底边的70%）
  const tubeR = cx + 130;
  // 场地墙：从 tube 直接向下延伸到底部（梯形两侧略外扩）
  const fieldVertH = botY - domeBottomY;
  const wallBL     = tubeL - fieldVertH * slope;
  const wallBR     = tubeR + fieldVertH * slope;
  const wallTL     = tubeL;  // 兼容后续引用
  const wallTR     = tubeR;

  // 草坪渐变：顶部略深（远）→ 底部略亮（近）
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tubeL, domeBottomY);
  ctx.lineTo(tubeR, domeBottomY);
  ctx.lineTo(wallBR, botY);
  ctx.lineTo(wallBL, botY);
  ctx.closePath();
  ctx.clip();  // 梯形区域裁剪

  // 基底草绿（参考图：饱和度高的鲜绿，顶部远处略浅）
  const grassGrad = ctx.createLinearGradient(0, domeBottomY, 0, botY);
  grassGrad.addColorStop(0,    '#4ab46e');   // 远处略带光照的浅绿
  grassGrad.addColorStop(0.4,  '#3ba85f');
  grassGrad.addColorStop(0.75, '#2f9853');
  grassGrad.addColorStop(1,    '#26823f');   // 近处稍深
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, domeBottomY - 4, W, botY - domeBottomY + 6);

  // 横向草坪条纹（参考图：宽明显条纹，模拟割草机痕迹，对比加强）
  const fieldH  = botY - domeBottomY;
  const stripeN = 8;                          // 8 条带，更细一点
  const stripeH = fieldH / stripeN;
  for (let i = 0; i < stripeN; i++) {
    const yA = domeBottomY + i * stripeH;
    // 加强对比：浅条 +12% 白，深条 +18% 黑绿
    ctx.fillStyle = (i % 2 === 0) ? 'rgba(255,255,250,0.12)' : 'rgba(0,40,18,0.18)';
    ctx.fillRect(0, yA, W, stripeH + 0.5);
  }

  // 细密垂直草丝纹理（每条带内部加上 50-80 根短"草丝"）
  for (let i = 0; i < stripeN; i++) {
    const yA = domeBottomY + i * stripeH;
    const isLight = (i % 2 === 0);
    const grassColor = isLight ? 'rgba(255,255,240,' : 'rgba(8,40,20,';
    const grassAlpha = isLight ? 0.08 : 0.12;
    const grassCount = 70;
    for (let g = 0; g < grassCount; g++) {
      const gx = Math.random() * W;
      const gy = yA + Math.random() * stripeH;
      const gh = 1.2 + Math.random() * 2.5;        // 草丝长度 1.2-3.7px
      ctx.strokeStyle = grassColor + grassAlpha + ')';
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(gx, gy);
      ctx.lineTo(gx + (Math.random() - 0.5) * 0.6, gy - gh);
      ctx.stroke();
    }
  }

  // 散落的细小亮斑/暗斑（光斑感）
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 140; i++) {
    const nx = Math.random() * W;
    const ny = domeBottomY + Math.random() * fieldH;
    const nr = 0.4 + Math.random() * 0.8;
    const isHi = Math.random() < 0.5;
    ctx.fillStyle = isHi ? 'rgba(255,255,220,0.18)' : 'rgba(0,25,12,0.22)';
    ctx.beginPath(); ctx.arc(nx, ny, nr, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 边缘暗角（参考图：左右两侧略暗，模拟立体感）
  const edgeGrad = ctx.createLinearGradient(0, 0, W, 0);
  edgeGrad.addColorStop(0,    'rgba(0,20,10,0.35)');
  edgeGrad.addColorStop(0.18, 'rgba(0,20,10,0)');
  edgeGrad.addColorStop(0.82, 'rgba(0,20,10,0)');
  edgeGrad.addColorStop(1,    'rgba(0,20,10,0.35)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, domeBottomY, W, fieldH);
  // 上方光晕（远处略亮）
  const topGlow = ctx.createLinearGradient(0, domeBottomY, 0, domeBottomY + fieldH * 0.4);
  topGlow.addColorStop(0, 'rgba(255,255,220,0.10)');
  topGlow.addColorStop(1, 'rgba(255,255,220,0)');
  ctx.fillStyle = topGlow;
  ctx.fillRect(0, domeBottomY, W, fieldH * 0.4);

  // ── 禁区白色标线已整体去除（大禁区/小禁区/罚球点/D 弧）──
  ctx.restore();

  // ── 球场边界白线（梯形外框，参考图细线无发光）──
  ctx.lineCap   = 'round';
  ctx.lineWidth = 2;
  ctx.shadowBlur  = 4;
  ctx.shadowColor = 'rgba(255,255,255,0.35)';
  ctx.strokeStyle = 'rgba(255,255,255,0.92)';

  // 顶线（球门线，水平）
  ctx.beginPath();
  ctx.moveTo(tubeL, domeBottomY);
  ctx.lineTo(tubeR, domeBottomY);
  ctx.stroke();
  // 左墙
  ctx.beginPath();
  ctx.moveTo(tubeL, domeBottomY);
  ctx.lineTo(wallBL, botY);
  ctx.stroke();
  // 右墙
  ctx.beginPath();
  ctx.moveTo(tubeR, domeBottomY);
  ctx.lineTo(wallBR, botY);
  ctx.stroke();
  // 底线（连接左右墙底部）
  ctx.beginPath();
  ctx.moveTo(wallBL, botY - 1);
  ctx.lineTo(wallBR, botY - 1);
  ctx.stroke();

  ctx.shadowBlur = 0;

  // ── Pegs ─────────────────────────────────────────────────────────────
  for (let row = 0; row < ROWS; row++) {
    const numPegs = row + 3;   // 第一行固定 3 钉，底行 = 槽数+1
    for (let col = 0; col < numPegs; col++) {
      const x       = pegX(row, col);
      const y       = pegY(row);
      const isSplit = splits.some(([sr, sc]) => sr === row && sc === col);

      if (isSplit) {
        const spikes  = 6;
        // 呼吸脉冲：0~1 正弦，每颗钉相位略有偏移增加层次感
        const phase   = (row * 7 + col * 3) * 0.8;
        const pulse   = 0.5 + 0.5 * Math.sin(Date.now() / 700 + phase);
        const outerR  = pegR * (1.9 + pulse * 0.5);   // 9.5~12px 呼吸
        const innerR  = pegR * 0.72;
        const glowR   = outerR + 5 + pulse * 5;

        // Outer breathing glow（金色）
        const ga = ctx.createRadialGradient(x, y, 0, x, y, glowR);
        ga.addColorStop(0,   `rgba(255,210,50,${0.45 + pulse * 0.3})`);
        ga.addColorStop(0.5, `rgba(255,160,20,${0.15 + pulse * 0.1})`);
        ga.addColorStop(1,   'transparent');
        ctx.fillStyle = ga;
        ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI * 2); ctx.fill();

        // Starburst shape（金色渐变）
        ctx.beginPath();
        for (let i = 0; i < spikes * 2; i++) {
          const angle = (i * Math.PI / spikes) - Math.PI / 2;
          const r = i % 2 === 0 ? outerR : innerR;
          const sx = x + Math.cos(angle) * r;
          const sy = y + Math.sin(angle) * r;
          i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        const sg = ctx.createRadialGradient(x - 1, y - 2, 0, x, y, outerR);
        sg.addColorStop(0,   '#fff0a0');
        sg.addColorStop(0.4, '#ffcc20');
        sg.addColorStop(0.8, '#dd8800');
        sg.addColorStop(1,   '#995500');
        ctx.fillStyle = sg;
        ctx.fill();

        // Center circle
        const cg = ctx.createRadialGradient(x - 1, y - 1.5, 0, x, y, innerR);
        cg.addColorStop(0, '#fffde0');
        cg.addColorStop(1, '#ffaa00');
        ctx.fillStyle = cg;
        ctx.beginPath(); ctx.arc(x, y, innerR, 0, Math.PI * 2); ctx.fill();

        // Center shine
        ctx.fillStyle = `rgba(255,255,220,${0.6 + pulse * 0.3})`;
        ctx.beginPath(); ctx.arc(x - 1, y - 1.5, innerR * 0.38, 0, Math.PI * 2); ctx.fill();

      } else {
        // Drop shadow — 深草投影
        const sh = ctx.createRadialGradient(x + 1.2, y + 1.8, 0, x + 1.2, y + 1.8, pegR + 2.2);
        sh.addColorStop(0,   'rgba(0,25,12,0.55)');
        sh.addColorStop(1,   'transparent');
        ctx.fillStyle = sh;
        ctx.beginPath(); ctx.arc(x + 1.2, y + 1.8, pegR + 2.2, 0, Math.PI * 2); ctx.fill();

        // Peg body — 浅绿凸起（参考图：草坪色调的立体小圆点）
        const p = ctx.createRadialGradient(x - pegR * 0.45, y - pegR * 0.55, 0, x, y, pegR);
        p.addColorStop(0,    '#e8f5de');
        p.addColorStop(0.55, '#c7dfa8');
        p.addColorStop(1,    '#7aa86a');
        ctx.fillStyle = p;
        ctx.beginPath(); ctx.arc(x, y, pegR, 0, Math.PI * 2); ctx.fill();

        // 顶面高光
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.beginPath(); ctx.arc(x - pegR * 0.35, y - pegR * 0.45, pegR * 0.32, 0, Math.PI * 2); ctx.fill();
      }

      // 碰撞高亮：加法混合让钉子自然变亮，不覆盖原色
      const gAmt = glows[row * 20 + col] || 0;
      if (gAmt > 0) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const gr = ctx.createRadialGradient(x, y, 0, x, y, pegR);
        gr.addColorStop(0,   `rgba(255,240,160,${gAmt * 0.9})`);
        gr.addColorStop(1,   `rgba(120,180,255,0)`);
        ctx.fillStyle = gr;
        ctx.beginPath(); ctx.arc(x, y, pegR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
  }
}

// ── 球门内足球堆物理动画（椭圆形网，足球堆叠在底部轻微抖动）─────────
(function initGoalPhysics() {
  const dc   = document.getElementById('dome-canvas');
  if (!dc) return;
  const dx   = dc.getContext('2d');
  // canvas 物理 166x66，CSS 83x33，scale(2,2) 对齐 → logical = CSS 尺寸
  const W_L  = 83;
  const H_L  = 33;
  const GRAV = 0.10;
  const DAMP = 0.45;
  const FRIC = 0.88;
  const BALL_R = 4.5;  // 球更小，适应小球门

  // 8 颗足球堆满球门（参考图：球门内塞满 7-9 颗球）
  const N = 8;
  const balls = Array.from({length: N}, (_, i) => {
    return {
      x:  12 + Math.random() * (W_L - 24),
      y:  6 + Math.random() * (H_L - 24),
      vx: (Math.random() - 0.5) * 0.8,
      vy: 0,
      r:  BALL_R,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.03,
    };
  });

  // 绘制单个足球：按截角二十面体正投影精确绘制（与下落足球共用算法）
  function drawMiniFoot(b) {
    dx.save();
    dx.translate(b.x, b.y);
    dx.rotate(b.rot);
    drawSoccerGlyph(dx, 0, 0, b.r);
    dx.restore();
  }
  // 与 drawSoccerBall 共用同一贴图（ball1.jpg），未加载时回退几何绘制
  function drawSoccerGlyph(cx2d, x, y, R) {
    cx2d.save();
    cx2d.fillStyle = 'rgba(0,0,0,0.38)';
    cx2d.beginPath(); cx2d.arc(x + 0.5, y + 1.0, R * 0.96, 0, Math.PI * 2); cx2d.fill();
    cx2d.restore();

    if (BALL_SPRITE.ready && BALL_SPRITE.img) {
      cx2d.drawImage(BALL_SPRITE.img, x - R, y - R, R * 2, R * 2);
      return;
    }

    // 黑底
    cx2d.fillStyle = '#141414';
    cx2d.beginPath(); cx2d.arc(x, y, R, 0, Math.PI * 2); cx2d.fill();

    const r1       = R * 0.26;
    const a1       = r1 * Math.cos(Math.PI / 5);
    const s1       = 2 * r1 * Math.sin(Math.PI / 5);
    const r2       = s1;
    const a2       = r2 * Math.cos(Math.PI / 6);
    const hex_dist = a1 + a2;

    const wg = cx2d.createRadialGradient(x - R * 0.3, y - R * 0.35, 0, x, y, R);
    wg.addColorStop(0, '#ffffff'); wg.addColorStop(0.7, '#f3f4f6'); wg.addColorStop(1, '#c8ced4');
    cx2d.fillStyle = wg;
    for (let i = 0; i < 5; i++) {
      const ang = (i * Math.PI * 2) / 5 - Math.PI / 2;
      const hx = x + Math.cos(ang) * hex_dist;
      const hy = y + Math.sin(ang) * hex_dist;
      cx2d.beginPath();
      for (let j = 0; j < 6; j++) {
        const vang = ang + Math.PI + Math.PI / 6 + (j * Math.PI / 3);
        const vx = hx + Math.cos(vang) * r2;
        const vy = hy + Math.sin(vang) * r2;
        j === 0 ? cx2d.moveTo(vx, vy) : cx2d.lineTo(vx, vy);
      }
      cx2d.closePath();
      cx2d.fill();
    }

    const sh = cx2d.createRadialGradient(x - R * 0.4, y - R * 0.45, 0, x - R * 0.4, y - R * 0.45, R * 0.95);
    sh.addColorStop(0, 'rgba(255,255,255,0.45)');
    sh.addColorStop(0.55, 'rgba(255,255,255,0.06)');
    sh.addColorStop(1, 'rgba(255,255,255,0)');
    cx2d.fillStyle = sh;
    cx2d.beginPath(); cx2d.arc(x, y, R - 0.5, 0, Math.PI * 2); cx2d.fill();
  }

  function step() {
    dx.clearRect(0, 0, W_L * 2, H_L * 2);
    dx.save();
    dx.scale(2, 2);

    // 物理：重力+摩擦+底面/侧壁碰撞
    for (const b of balls) {
      b.vy += GRAV;
      b.vx *= FRIC;
      b.x  += b.vx;
      b.y  += b.vy;
      b.rot += b.vrot;

      // 左右墙
      if (b.x - b.r < 2)       { b.x = 2 + b.r;       b.vx =  Math.abs(b.vx) * DAMP; }
      if (b.x + b.r > W_L - 2) { b.x = W_L - 2 - b.r; b.vx = -Math.abs(b.vx) * DAMP; }
      // 底面
      if (b.y + b.r > H_L - 1) { b.y = H_L - 1 - b.r; b.vy = -Math.abs(b.vy) * DAMP; b.vrot *= 0.9; }
      // 顶部（球门横梁内侧）
      if (b.y - b.r < 2)       { b.y = 2 + b.r;       b.vy =  Math.abs(b.vy) * DAMP; }
    }
    // 球碰球
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b2 = balls[j];
        const dx2 = a.x - b2.x, dy2 = a.y - b2.y;
        const dist = Math.sqrt(dx2*dx2 + dy2*dy2);
        const minD = a.r + b2.r;
        if (dist < minD && dist > 0) {
          const nx = dx2/dist, ny = dy2/dist;
          const ov = (minD - dist) / 2;
          a.x  += nx*ov;  a.y  += ny*ov;
          b2.x -= nx*ov;  b2.y -= ny*ov;
          const relVx = a.vx - b2.vx, relVy = a.vy - b2.vy;
          const dot = relVx*nx + relVy*ny;
          if (dot < 0) {
            a.vx  -= dot * nx * 0.7;  a.vy  -= dot * ny * 0.7;
            b2.vx += dot * nx * 0.7;  b2.vy += dot * ny * 0.7;
          }
        }
      }
    }

    // 绘制（按 y 排序，后画的在上）
    balls.sort((a, b) => a.y - b.y);
    for (const b of balls) drawMiniFoot(b);

    dx.restore();
    requestAnimationFrame(step);
  }
  step();
})();

// ── 专业倍率参考表（基于 Stake.com 行业标准，按行数独立配置）──
// 格式：每行按 [边缘→中心] 列出 ceil((rows+1)/2) 个唯一倍率值
// 校准器对整体等比缩放，使期望 RTP ≈ 97.5%（Stake 约 99%，差异约 1.5%）
const SLOT_REF = {

// 根据行数生成基础倍率配置（对称展开）
function buildBaseConfigs(rows) {
  return SLOT_REF[rows].map(ref => {
    const slots = rows + 1;
    const half  = Math.floor(slots / 2);
    return slots % 2 === 1
      ? [...ref.slice(0, half), ref[half], ...ref.slice(0, half).reverse()]
      : [...ref.slice(0, half), ...ref.slice(0, half).reverse()];
  });
}


let slotConfigs = [];  // 由 onRowsChanged() 动态填充

// 倍率 → 颜色 class 映射
function valToClass(v) {
  if (v >= 100)  return 's-mega';
  if (v >= 25)   return 's-jackpot';
  if (v >= 3)    return 's-high';
  if (v >= 1.5)  return 's-orange';
  if (v >= 1.2)  return 's-yellow';
  if (v >= 1.05) return 's-warm';
  if (v >= 0.8)  return 's-neutral';
  return 's-low';
}

let slotEls = [];

// 根据当前 selectedRows 重建槽位 DOM
// 根据槽宽计算字号：约束来自3字符数字（如"0.2"、"130"），安全系数 slotW÷1.9
function calcSlotFsize(slotW) {
  return {
    fsize: Math.max(9,  Math.min(16, Math.floor(slotW / 1.9))) + 'px',
    xsize: Math.max(6,  Math.min(10, Math.floor(slotW / 3.5))) + 'px',
  };
}

function slotDisp(val) {
  return val >= 1000 ? (Math.round(val / 100) / 10 + 'K')
       : val >= 10   ? Math.round(val)
       : +val.toFixed(1);
}

function rebuildSlotDom() {
  const container = document.querySelector('.slots');
  const slots  = selectedRows + 1;
  const cfg    = slotConfigs[modeIdx] || [];
  const slotW  = (container.offsetWidth - 2 * PAD_SIDE) / slots;
  container.style.padding = `0 ${PAD_SIDE}px 4px`;
  const { fsize, xsize } = calcSlotFsize(slotW);

  container.innerHTML = '';
  for (let i = 0; i < slots; i++) {
    const div = document.createElement('div');
    const val = cfg[i];
    div.className    = 'slot ' + valToClass(val);
    div.style.fontSize = fsize;
    div.innerHTML = `<span>${slotDisp(val)}</span><span class="slot-x" style="font-size:${xsize}">×</span>`;
    container.appendChild(div);
  }
  slotEls = Array.from(container.querySelectorAll('.slot'));
}

function updateSlots(idx) {
  const cfg    = slotConfigs[idx] || [];
  const container = document.querySelector('.slots');
  const slotW  = (container.offsetWidth - 2 * PAD_SIDE) / (selectedRows + 1);
  const { fsize, xsize } = calcSlotFsize(slotW);

  slotEls.forEach((slot, i) => {
    const val = cfg[i];
    slot.className     = 'slot ' + valToClass(val);
    slot.style.fontSize = fsize;
    slot.innerHTML = `<span>${slotDisp(val)}</span><span class="slot-x" style="font-size:${xsize}">×</span>`;
  });
}

// ══════════════════════════════════════════════
//  游戏主逻辑
// ══════════════════════════════════════════════
function initGame() {
  // ── 建立 AbortController（行数切换时中止旧实例的监听器和呼吸循环）──
  const ctrl = new AbortController();
  _gameCtrl  = ctrl;
  const { signal } = ctrl;

  // ── 常量（与 drawBoard 保持一致）──
  const ROWS       = selectedRows;
  const SLOTS      = selectedRows + 1;  // 第一行2钉 → ROWS+1槽
  const mwH        = (document.querySelector('.machine-wrap')?.offsetHeight) || 0;
  const padT       = 10 + mwH;
  const padB       = 7;
  // 使用实际容器宽度，与 drawBoard 保持一致（.device 有 6px 边框，内容宽 ≠ 390）
  const W          = document.getElementById('board').parentElement.offsetWidth || 390;
  const cx         = W / 2;
  const d          = (W - 2 * PAD_SIDE) / (ROWS + 1); // 底行外沿贴安全边缘，行少钉大
  const rowH       = d * Math.sqrt(3) / 2;
  const H          = padT + ROW_H16 * ROWS_MAX + padB; // 固定高度
  const pegR       = Math.min(rowH, d) * 0.17;
  const ballR      = Math.max(4, Math.min(9, pegR * 1.75));
  const splits = getSplits();

  // 底行钉子中心固定在 canvas 底部上方 15px（与 drawBoard 一致）
  const pegShift   = (H - padB - 15) - (padT + (ROWS - 0.5) * rowH);
  const pegX = (row, col) => cx - ((row + 2) * d) / 2 + col * d;
  const pegY = (row)      => padT + row * rowH + rowH / 2 + pegShift;

  // ── 状态（balance/autoMode/balls 等为模块级，跨 initGame 调用持久）──
  let rafId = null;

  // ── DOM 引用 ──
  const canvas   = document.getElementById('board');
  const ctx      = canvas.getContext('2d');
  const balEl    = document.querySelector('.bal-value');
  const startBtn = document.querySelector('.start-btn');
  const startLbl = startBtn.querySelector('span');           // 内部文本容器（被 CSS 隐藏，仅作状态承载）
  const autoPanel = document.querySelector('.ctrl-auto');    // AUTO 面板承担自动按钮角色
  const histList = document.querySelector('.hist-list');

  // 行数切换后重置按钮状态（上一局球若未落槽已被清除，按钮应可用）
  if (!autoMode) startBtn.disabled = false;

  // 余额格式化
  function fmtBalance(v) {
    return '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  balEl.textContent = fmtBalance(balance);

  // ── 历史倍率 class ──
  function histClass(m) {
    if (m >= 100) return 'h-mega';
    if (m >= 25)  return 'h-jackpot';
    if (m >= 3)   return 'h-high';
    if (m >= 1.5) return 'h-mid';
    if (m < 1)    return 'h-low';
    return 'h-mid';
  }

  function addHistory(multiplier) {
    const badge = document.createElement('div');
    badge.className = 'hist-badge ' + histClass(multiplier);
    const mDisp = multiplier >= 1000
      ? (Math.round(multiplier / 100) / 10 + 'K')
      : multiplier >= 10 ? Math.round(multiplier) : multiplier;
    badge.textContent = mDisp + '×';
    histList.appendChild(badge);
    histList.scrollLeft = histList.scrollWidth;
    while (histList.children.length > 30) histList.removeChild(histList.firstChild);
  }

  // 足球配色：底色(白) + 五边形色 + 阴影 + 最深（用于分裂态标识）
  const BALL_PALETTES = [
    ['#ffffff','#1a1a1a','#d8dce0'],   // depth 0：经典黑白足球
    ['#fff1e0','#8a2a08','#d8bfa8'],   // depth 1：暖橙足球
    ['#ffdfe5','#880020','#d8a8b0'],   // depth 2：深红足球
  ];

  // ── 绘制单球（足球样式：白底 + 5 个黑色五边形）──
  function drawBall(x, y, alpha = 1, depth = 0, rot = 0) {
    ctx.shadowBlur = 0;
    ctx.globalAlpha = alpha;
    drawSoccerBall(ctx, x, y, ballR, rot);
    ctx.globalAlpha = 1;
  }

  /**
   * 按截角二十面体正投影绘制 ⚽ 足球
   * 几何布局（共享边构型）：
   *   - 中心黑色正五边形（边长 s1）
   *   - 5 个白色正六边形围绕中心五边形，每个六边形的一条内边与中心五边形的一条边重合
   *   - 相邻两六边形在五边形顶点处"顶点邻接"，它们的外顶点之间留出三角形黑色缝隙
   *   - 这些黑色缝隙 + 外圆边缘共同构成 5 瓣"背面黑五边形"的可见投影
   * 底色采用黑色，不再画白色内圆 → 黑色瓣直接透出
   */
  function drawSoccerBall(cx2d, x, y, R, rot = 0) {
    // 阴影（阴影位置不跟随旋转）
    cx2d.save();
    cx2d.fillStyle = 'rgba(0,0,0,0.38)';
    cx2d.beginPath(); cx2d.arc(x + 0.8, y + 1.4, R * 0.96, 0, Math.PI * 2); cx2d.fill();
    cx2d.restore();

    // 优先使用 ball1.jpg 生成的 sprite 贴图（带旋转）
    if (BALL_SPRITE.ready && BALL_SPRITE.img) {
      cx2d.save();
      cx2d.translate(x, y);
      if (rot) cx2d.rotate(rot);
      cx2d.drawImage(BALL_SPRITE.img, -R, -R, R * 2, R * 2);
      cx2d.restore();
      return;
    }

    // 回退几何绘制
    // 1. 黑色底圆（作为中心五边形 + 5 瓣 + 外圈细边的共同底色）
    cx2d.fillStyle = '#141414';
    cx2d.beginPath(); cx2d.arc(x, y, R, 0, Math.PI * 2); cx2d.fill();

    // 几何参数（截角二十面体正投影）
    const r1       = R * 0.26;                           // 中心五边形外接圆半径
    const a1       = r1 * Math.cos(Math.PI / 5);         // 中心五边形 apothem
    const s1       = 2 * r1 * Math.sin(Math.PI / 5);     // 五边形边长 = 六边形边长
    const r2       = s1;                                 // 六边形外接圆半径
    const a2       = r2 * Math.cos(Math.PI / 6);         // 六边形 apothem
    const hex_dist = a1 + a2;                            // 六边形中心到原点的距离

    // 2. 5 个白色六边形（一条边与中心五边形共享）
    //    六边形方向：朝内边的法线 = 径向外，所以顶点相对朝内方向偏移 ±30°, ±90°, ±150°
    const whiteGrad = cx2d.createRadialGradient(x - R * 0.3, y - R * 0.35, 0, x, y, R);
    whiteGrad.addColorStop(0,    '#ffffff');
    whiteGrad.addColorStop(0.7,  '#f3f4f6');
    whiteGrad.addColorStop(1,    '#c8ced4');
    cx2d.fillStyle = whiteGrad;
    for (let i = 0; i < 5; i++) {
      const ang = (i * Math.PI * 2) / 5 - Math.PI / 2;  // 从正上方 72° 均分
      const hx = x + Math.cos(ang) * hex_dist;
      const hy = y + Math.sin(ang) * hex_dist;
      cx2d.beginPath();
      for (let j = 0; j < 6; j++) {
        // 顶点角度：朝内方向 ang+π，起点偏移 π/6（让一条边法线对齐径向）
        const vang = ang + Math.PI + Math.PI / 6 + (j * Math.PI / 3);
        const vx = hx + Math.cos(vang) * r2;
        const vy = hy + Math.sin(vang) * r2;
        j === 0 ? cx2d.moveTo(vx, vy) : cx2d.lineTo(vx, vy);
      }
      cx2d.closePath();
      cx2d.fill();
    }
    // 中心五边形区域本身底色就是黑色，无需再画（被 6 个白六边形自然围出）

    // 3. 顶部径向高光（球面质感）
    const sh = cx2d.createRadialGradient(x - R * 0.4, y - R * 0.45, 0, x - R * 0.4, y - R * 0.45, R * 0.95);
    sh.addColorStop(0,    'rgba(255,255,255,0.45)');
    sh.addColorStop(0.55, 'rgba(255,255,255,0.06)');
    sh.addColorStop(1,    'rgba(255,255,255,0)');
    cx2d.fillStyle = sh;
    cx2d.beginPath(); cx2d.arc(x, y, R - 0.5, 0, Math.PI * 2); cx2d.fill();
  }

  // ── 绘制球 + 尾部幻影 ──
  function drawBallWithTrail(ball) {
    ctx.globalAlpha = 1;
    drawBall(ball.x, ball.y, 1, ball.depth || 0, ball.rot || 0);
  }

  // ── 物理更新 ──
  function updateBall(ball, dt = 1) {
    // 重力（按 dt 缩放）
    ball.vy += 0.032;
    if (ball.vy > 1.8) ball.vy = 1.8;

    ball.vx *= 0.98;

    ball.x += ball.vx;
    ball.y += ball.vy;

    // ── 旋转积分（空气极轻阻尼）──
    if (ball.rot  == null) ball.rot  = 0;
    if (ball.vrot == null) ball.vrot = 0;
    ball.rot  += ball.vrot * dt;
    ball.vrot *= 0.995;

    // 边界反弹（反弹时注入自旋：ball 被墙弹回，摩擦产生相反方向旋转）
    if (ball.x < ballR) {
      ball.x = ballR;
      ball.vx = Math.abs(ball.vx) * 0.5;
      ball.vrot += ball.vy / ballR * 0.4;
    }
    if (ball.x > W - ballR) {
      ball.x = W - ballR;
      ball.vx = -Math.abs(ball.vx) * 0.5;
      ball.vrot -= ball.vy / ballR * 0.4;
    }

    if (!ball.cooldown) ball.cooldown = {};
    let hitResult = null;
    const minDist = ballR + pegR;

    // ── 宽区分裂钉预检（半径19px，匹配星形视觉）──
    const splitR = ballR + pegR * 3;
    for (const [sr, sc] of splits) {
      const spk = sr * 20 + sc;
      if (ball.usedSplits?.[spk]) continue;
      const spx = pegX(sr, sc), spy = pegY(sr);
      const sdx = ball.x - spx, sdy = ball.y - spy;
      if (sdx * sdx + sdy * sdy < splitR * splitR) {
        if (!ball.usedSplits) ball.usedSplits = {};
        ball.usedSplits[spk] = true;
        hitResult = { pegKey: spk, isSplit: true };
        pegGlows[spk] = 1;
        break;
      }
    }

    for (let row = 0; row < ROWS; row++) {
      const numPegs = row + 3;   // 第一行固定 3 钉，底行 = 槽数+1
      for (let col = 0; col < numPegs; col++) {
        const pegKey = row * 20 + col;
        const px = pegX(row, col);
        const py = pegY(row);
        const dx = ball.x - px;
        const dy = ball.y - py;
        const distSq = dx * dx + dy * dy;

        if (distSq >= minDist * minDist) continue; // 不在碰撞范围，跳过

        const dist = Math.sqrt(distSq);
        const nx = dx / dist;
        const ny = dy / dist;

        // ── 始终推出，确保无视觉重叠 ──
        ball.x = px + nx * (minDist + 2);
        ball.y = py + ny * (minDist + 2);

        if (ball.cooldown[pegKey] > 0) {
          // 冷却中：仅推出，不改速度
          ball.cooldown[pegKey]--;
          continue;
        }

        // ── 碰撞响应：侧向偏转模型 ──
        const side = dx >= 0 ? 1 : -1;
        ball.vx = side * (0.45 + Math.random() * 0.55);
        ball.vy = Math.max(Math.abs(ball.vy) * 0.65, 0.35) - 0.08;
        ball.cooldown[pegKey] = 18;

        // ── 碰撞驱动旋转：接触点切向速度 → 角速度（摩擦滚动模型）──
        // 切向量 (tx, ty) = 法向量 (nx, ny) 顺时针旋 90°
        const tx = -ny;
        const ty = nx;
        const vT = ball.vx * tx + ball.vy * ty;  // 切向线速度
        // ω = v_tangent / R，0.85 为摩擦系数，带轻微随机抖动模拟滑移
        ball.vrot = vT / ballR * 0.85 + (Math.random() - 0.5) * 0.08;

        pegGlows[pegKey] = 1;
        if (!hitResult) {
          hitResult = { pegKey, isSplit: false };
        }
      }
    }
    return hitResult;
  }

  // ── 检测落槽 ──
  function checkLanded(ball) {
    const landY = H - ballR;
    if (ball.y >= landY) {
      // 槽居中，左边界由当前行数的 d 决定
      const slotLeft = cx - SLOTS * d / 2;
      let idx = Math.floor((ball.x - slotLeft) / d);
      idx = Math.max(0, Math.min(SLOTS - 1, idx));
      return idx;
    }
    return -1;
  }

  // ── 结算 ──
  function settle(slotIdx, weight = 1) {
    const cfg  = slotConfigs[modeIdx];
    const val  = cfg[slotIdx];
    const multiplier = val;

    const slotEl = slotEls[slotIdx];

    const bet    = betValues[betIdx];
    const won    = parseFloat((bet * weight * multiplier).toFixed(2));
    pendingWin   = parseFloat((pendingWin + won).toFixed(2));

    // 得分音效
    if (window._onWin) window._onWin(multiplier);

    // 槽位高亮
    slotEl.classList.add('winning');
    setTimeout(() => slotEl.classList.remove('winning'), 500);

    // 飘字：+$XX 显示在对应槽位上方
    (function showFloatWin() {
      const boardEl = document.querySelector('.board-wrap');
      const boardRect = boardEl.getBoundingClientRect();
      const canvasEl  = document.getElementById('board');
      const canvasRect = canvasEl.getBoundingClientRect();

      const el = document.createElement('div');
      el.className = 'float-win' + (multiplier >= 100 ? ' mega' : multiplier >= 25 ? ' jackpot' : '');
      el.textContent = '+$' + won.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

      // 槽居中，CSS 像素下按当前行数 d 缩放（canvasRect.width == W，scale 恒为 1）
      const d_css       = d;           // d 已用实际 W 计算，无需再乘 scale
      const cssSlotW    = d_css;       // 单槽宽，用于边缘槽位溢出保护
      const slotLeftCss = canvasRect.width / 2 - SLOTS * d_css / 2;
      const slotCenterX = slotLeftCss + (slotIdx + 0.5) * d_css;
      const rawX = canvasRect.left - boardRect.left + slotCenterX;
      const relY = canvasRect.top  - boardRect.top  + canvasRect.height - 20;

      // wrapper 负责水平定位，el 负责向上飘动动画
      // 两者分离，避免动画 transform 覆盖水平对齐的 translateX
      const wrapper = document.createElement('div');
      wrapper.style.cssText = `position:absolute;top:${relY}px;pointer-events:none;z-index:20;`;

      if (slotIdx <= 2) {
        wrapper.style.left = Math.max(rawX - cssSlotW * 0.5, 2) + 'px';
      } else if (slotIdx >= SLOTS - 3) {
        const rightOffset = Math.max(boardRect.width - (rawX + cssSlotW * 0.5), 2);
        wrapper.style.right = rightOffset + 'px';
      } else {
        wrapper.style.left = rawX + 'px';
        wrapper.style.transform = 'translateX(-50%)';
      }

      el.style.position = 'static';
      el.style.zIndex   = '';
      wrapper.appendChild(el);
      boardEl.appendChild(wrapper);
      setTimeout(() => wrapper.remove(), 1500);
    })();

    function done() {
      pendingSettles--;
      if (balls.length === 0 && pendingSettles === 0) afterSettle();
    }

    addHistory(multiplier);
    done();
  }

  // ── 结算后处理（所有球都落槽后） ──
  function afterSettle() {
    // 一次性把本轮盈利加入余额
    if (pendingWin > 0) {
      const totalWon = pendingWin;
      pendingWin = 0;
      // 等槽位飘字动画结束（1.4s）后留约0.6s间隔再显示余额飘字
      setTimeout(() => {
        balance = parseFloat((balance + totalWon).toFixed(2));
        balEl.textContent = fmtBalance(balance);
        const wrap = document.querySelector('.balance-wrap');
        const el = document.createElement('div');
        el.className = 'bal-float';
        el.textContent = '+$' + totalWon.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 2200);
      }, 500);
    } else {
      pendingWin = 0;
    }

    startBtn.disabled = false;
    lockControls(false);
    drawBoard();

    if (autoMode && autoRemaining > 0) {
      setTimeout(() => {
        if (autoMode && autoRemaining > 0) {
          const ok = launchBall();
          if (ok) autoRemaining--;
          else {
            autoMode = false;
            autoRemaining = 0;
            autoPanel.classList.remove('active');
          }
        } else if (autoMode) {
          autoMode = false;
          autoPanel.classList.remove('active');
        }
      }, 600);
    } else if (autoMode) {
      // 余数归零，退出自动
      autoMode = false;
      autoPanel.classList.remove('active');
    }
  }

  // ── 动画循环（多球）──
  let lastFrameTime = 0;
  function gameLoop(timestamp) {
    if (balls.length === 0 && pendingSettles === 0) return;
    const delta = lastFrameTime ? Math.min(timestamp - lastFrameTime, 50) : 16.67;
    lastFrameTime = timestamp;
    const dt = delta / 16.67;  // 连续缩放，避免整数步跳帧

    // 衰减钉子发光
    Object.keys(pegGlows).forEach(k => {
      pegGlows[k] -= 0.08;
      if (pegGlows[k] <= 0) delete pegGlows[k];
    });

    // 重绘静态层（含钉子发光）
    drawBoard(pegGlows);

    // 更新 + 绘制每颗球（物理步数按帧率校正，保持 60fps 等效速度）
    for (let i = balls.length - 1; i >= 0; i--) {
      const ball = balls[i];

      // 记录尾迹
      if (!ball.trail) ball.trail = [];
      ball.trail.push({ x: ball.x, y: ball.y });
      if (ball.trail.length > 7) ball.trail.shift();

      // 物理更新（连续 delta-time，每帧1次，无跳帧）
      let hit = null;
      const h = updateBall(ball, dt);
      if (h) hit = h;
      if (hit) {
        pegGlows[hit.pegKey] = 1.0;
        const canSplitNow = hit.isSplit &&
          (ball.splitFrom == null || ball.splitFrom !== hit.pegKey) &&
          balls.length < 8;
        if (canSplitNow) {
          ball.splitFrom = hit.pegKey;
          const splitW = (ball.weight ?? 1) * 0.55;
          ball.weight = splitW;
          ball.depth  = (ball.depth || 0) + 1;
          balls.push({
            x:  ball.x,
            y:  ball.y,
            vx: -(ball.vx) + (Math.random() - 0.5) * 0.4,
            vy:  ball.vy  * 0.85,
            trail:    [],
            cooldown: {},
            isSplit:  true,
            splitFrom: hit.pegKey,
            weight:   splitW,
            depth:    ball.depth,
            rot:      ball.rot || 0,
            vrot:     -(ball.vrot || 0) * 0.7 + (Math.random() - 0.5) * 0.2,
          });
          // 分裂特效：粒子 + 飘字 + 音效
          if (window._onSplit) window._onSplit(ball.x, ball.y);
        } else if (hit && !hit.isSplit) {
          // 普通碰钉音效
          if (window._onHit) window._onHit();
        }
      }

      // 绘制（含尾迹）
      drawBallWithTrail(ball);

      // 落槽检测
      const idx = checkLanded(ball);
      if (idx >= 0) {
        const w = ball.weight ?? 1;
        balls.splice(i, 1);
        pendingSettles++;
        settle(idx, w);
      }
    }

    if (balls.length > 0 || pendingSettles > 0) {
      rafId = requestAnimationFrame(gameLoop);
    }
  }

  // ── 一次发球（支持 BALLS AMOUNT 同时多球）──
  function launchBall() {
    const bet       = betValues[betIdx];
    const ballsCnt  = ballsPerRound[ballsIdx];
    const totalCost = parseFloat((bet * ballsCnt).toFixed(2));
    if (balance < totalCost) {
      if (startLbl) startLbl.textContent = '余额不足';
      setTimeout(() => { if (startLbl) startLbl.textContent = 'PLAY'; }, 1200);
      return false;
    }

    balance = parseFloat((balance - totalCost).toFixed(2));
    balEl.textContent = fmtBalance(balance);
    startBtn.disabled = true;
    lockControls(true);

    // 同时发射 N 颗球，横向错开避免重叠
    for (let k = 0; k < ballsCnt; k++) {
      const spread = (k - (ballsCnt - 1) / 2) * 8;
      balls.push({
        x:  cx + spread + (Math.random() - 0.5) * 10,
        y:  padT - 16 - k * 14,                // 纵向错开，避免首帧重叠
        vx: (Math.random() - 0.5) * 0.3,
        vy: 1.6,
        trail:    [],
        cooldown: {},
        isSplit:   false,
        splitFrom: null,
        weight:    1.0,
        rot:       (Math.random() - 0.5) * Math.PI, // 出场随机姿态
        vrot:      (Math.random() - 0.5) * 0.05,
      });
    }

    if (!rafId || balls.length === ballsCnt) {
      rafId = requestAnimationFrame(gameLoop);
    }
    return true;
  }

  // ── PLAY 足球按钮 ──
  // 点击：若 AUTO>0 启动连发；再次点击进行中的 PLAY 会停止自动
  startBtn.addEventListener('click', () => {
    if (autoMode) {
      // 停止自动
      autoMode = false;
      autoRemaining = 0;
      autoPanel.classList.remove('active');
      return;
    }
    const autoTotal = autoValues[autoIdx];
    if (autoTotal > 0) {
      autoMode      = true;
      autoRemaining = autoTotal;
      autoPanel.classList.add('active');
    }
    const ok = launchBall();
    if (!ok && autoMode) {
      autoMode = false;
      autoRemaining = 0;
      autoPanel.classList.remove('active');
    } else if (autoMode) {
      autoRemaining--;
    }
  }, { signal });

  // ── 常驻呼吸动画（行数切换时 abort 自动停止）──
  (function breathingLoop() {
    if (signal.aborted) return;
    if (balls.length === 0 && pendingSettles === 0) {
      drawBoard(pegGlows);
    }
    requestAnimationFrame(breathingLoop);
  })();
}
</script>

<script>
// ══════════════════════════════════════════════
//  音频引擎
//  BGM  → HTML5 Audio 播放原曲文件 bgm.mp3
//  SFX  → Web Audio API 程序合成
// ══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let bgGain = null;
let musicOn = true;

// HTML5 Audio BGM
let bgAudio = null;

// ── BGM：HTML5 Audio 播放原曲文件 ──
// 将音频文件命名为 bgm.mp3（或 bgm.ogg）放在与 HTML 同目录即可
function startBGM() {
  if (bgAudio) return;
  bgAudio = new Audio('./bgm.mp3');
  bgAudio.loop = true;
  bgAudio.volume = 0.5;
  if (musicOn) bgAudio.play().catch(() => {});
}

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    bgGain = audioCtx.createGain();  // 仅用于 SFX
    bgGain.gain.value = 1.0;
    bgGain.connect(audioCtx.destination);
    startBGM();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── 音效：分裂 ──
function playSplitSfx() {
  if (!sfxOn) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  // 柔和上升音调：三声轻铃，正弦波，低音量，慢衰减
  [0, 0.08, 0.16].forEach((dt, i) => {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    const g   = ctx.createGain();
    g.gain.value = 0.10;
    osc.connect(env); env.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520 + i * 130, now + dt);
    osc.frequency.linearRampToValueAtTime(640 + i * 130, now + dt + 0.22);
    env.gain.setValueAtTime(0, now + dt);
    env.gain.linearRampToValueAtTime(0.7, now + dt + 0.02);
    env.gain.exponentialRampToValueAtTime(0.001, now + dt + 0.38);
    osc.start(now + dt);
    osc.stop(now + dt + 0.4);
  });

  // 轻微气泡噪声（音量极低，增加质感）
  const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++)
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
  const src  = ctx.createBufferSource();
  const nG   = ctx.createGain();
  nG.gain.value = 0.06;
  src.buffer = buf; src.connect(nG); nG.connect(ctx.destination);
  src.start(now); src.stop(now + 0.08);
}

// ── 音效：碰钉 ──
function playHitSfx() {
  if (!sfxOn) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  const g = ctx.createGain(); g.gain.value = 0.12;
  osc.connect(env); env.connect(g); g.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.value = 480 + Math.random() * 120;
  env.gain.setValueAtTime(0.6, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.start(now); osc.stop(now + 0.09);
}

// ── 音效：落槽得分 ──
function playWinSfx(multiplier) {
  if (!sfxOn) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const freqs = multiplier >= 10 ? [523, 659, 784, 1047] : [392, 494, 587];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    const g = ctx.createGain(); g.gain.value = 0.22;
    osc.connect(env); env.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = f;
    const t = now + i * 0.07;
    env.gain.setValueAtTime(0.7, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t); osc.stop(t + 0.26);
  });
}

// ── 设置抽屉（header 右上角齿轮图标触发）──
let sfxOn = true;
const iconMenu        = document.getElementById('iconMenu');
const settingsPanel   = document.getElementById('settingsPanel');
const drawerBackdrop  = document.getElementById('drawerBackdrop');
const toggleMusic     = document.getElementById('toggleMusic');
const toggleSfx       = document.getElementById('toggleSfx');
const drawerRules     = document.getElementById('drawerRules');
const drawerExit      = document.getElementById('drawerExit');
const toastEl         = document.getElementById('toast');

// ── Toast 组件 ──
let _toastTimer = null;
function showToast(msg, duration = 1800) {
  if (!toastEl) return;
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

// 打开抽屉
function openDrawer() {
  getAudioCtx();
  settingsPanel.classList.add('open');
  drawerBackdrop.classList.add('show');
}
// 关闭抽屉
function closeDrawer() {
  settingsPanel.classList.remove('open');
  drawerBackdrop.classList.remove('show');
}

// 齿轮图标：打开抽屉
iconMenu.addEventListener('click', e => {
  e.stopPropagation();
  openDrawer();
});

// 点击遮罩：关闭抽屉
drawerBackdrop.addEventListener('click', closeDrawer);

// 游戏规则：toast 敬请期待
drawerRules.addEventListener('click', () => {
  showToast('敬请期待');
});

// 退出游戏：关闭抽屉 + 提示
drawerExit.addEventListener('click', () => {
  closeDrawer();
  showToast('已退出游戏');
});

// 音乐开关
toggleMusic.addEventListener('change', () => {
  musicOn = toggleMusic.checked;
  if (bgAudio) {
    if (musicOn) bgAudio.play().catch(() => {});
    else bgAudio.pause();
  }
});

// 音效开关
toggleSfx.addEventListener('change', () => {
  sfxOn = toggleSfx.checked;
});

// 第一次用户交互时启动音频（浏览器自动播放策略）
document.addEventListener('click', () => getAudioCtx(), { once: true });
</script>

<script>
// ══════════════════════════════════════════════
//  粒子系统 + SPLIT! 飘字（挂在 initGame 之后）
// ══════════════════════════════════════════════
(function patchGame() {
  // 等 initGame 完成后再 patch
  const canvas = document.getElementById('board');
  if (!canvas) return;

  // ── 粒子池 ──
  const particles = [];

  function spawnSplitParticles(x, y) {
    const colors = ['#00eeff', '#80ffee', '#ffffff', '#ffe080', '#00ccff'];
    for (let i = 0; i < 28; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        life: 1,
        decay: 0.025 + Math.random() * 0.02,
        r: 2 + Math.random() * 3,
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }
  }

  // ── 每帧更新粒子（叠加在 canvas 上层）──
  const dpr = window.devicePixelRatio || 1;
  function drawParticles() {
    if (particles.length === 0) return;
    const ctx = canvas.getContext('2d');
    // 只绘制，不清空（清空由 drawBoard 做）
    ctx.save();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.12; // 粒子重力
      p.vx *= 0.97;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 6; ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ── SPLIT! 飘字 ──
  function showSplitText(canvasX, canvasY) {
    const boardEl = document.querySelector('.board-wrap');
    const canvasEl = document.getElementById('board');
    const boardRect = boardEl.getBoundingClientRect();
    const canvasRect = canvasEl.getBoundingClientRect();

    const scaleX = canvasRect.width / 390;
    const scaleY = canvasRect.height / (canvasEl.height / dpr);

    const el = document.createElement('div');
    el.className = 'float-split';
    el.textContent = '分裂！';

    const px = canvasRect.left - boardRect.left + canvasX * scaleX;
    const py = canvasRect.top  - boardRect.top  + canvasY * scaleY;

    const wrap = document.createElement('div');
    wrap.style.cssText = `position:absolute;left:${px}px;top:${py}px;pointer-events:none;z-index:30;`;
    wrap.appendChild(el);
    boardEl.appendChild(wrap);
    setTimeout(() => wrap.remove(), 1300);
  }

  // ── Patch: 拦截 requestAnimationFrame 渲染循环，在每帧末尾绘制粒子 ──
  const origRAF = window.requestAnimationFrame.bind(window);
  window.requestAnimationFrame = function(cb) {
    return origRAF(function(ts) {
      cb(ts);
      drawParticles();
    });
  };

  // ── 暴露全局函数供 initGame 内部调用 ──
  window._onSplit = function(x, y) {
    spawnSplitParticles(x, y);
    showSplitText(x, y - 10);
    playSplitSfx();
  };
  window._onHit = function() {
    playHitSfx();
  };
  window._onWin = function(mult) {
    playWinSfx(mult);
  };
})();
</script>
